<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steelboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;700;900&family=Cormorant+SC:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'IM Fell English', serif;
      min-height: 100vh;
      overflow-x: auto;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.6rem 2.5rem 1.4rem;
      border-bottom: 1px solid #333;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-actions {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 1.1rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-solid {
      background: #fff;
      border: 1px solid #fff;
      color: #000;
    }

    .btn-solid:hover { background: #ddd; border-color: #ddd; }

    /* ── FILTER BAR ──────────────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 0.7rem 2.5rem;
      border-bottom: 1px solid #1a1a1a;
      flex-wrap: wrap;
      background: #030303;
    }

    .filter-search input {
      background: #000;
      border: 1px solid #2a2a2a;
      color: #ccc;
      font-family: 'IM Fell English', serif;
      font-size: 0.85rem;
      padding: 0.35rem 0.7rem;
      outline: none;
      width: 180px;
      transition: border-color 0.15s;
    }

    .filter-search input:focus { border-color: #555; }
    .filter-search input::placeholder { color: #444; }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .filter-label {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
    }

    .filter-chip {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #555;
      cursor: pointer;
      transition: all 0.12s;
      border-radius: 2px;
    }

    .filter-chip:hover { border-color: #666; color: #aaa; }
    .filter-chip.active { border-color: #666; color: #ccc; background: #111; }
    .filter-chip.chip-alta.active { border-color: #d47a7a; color: #d47a7a; background: rgba(180,60,60,0.1); }
    .filter-chip.chip-media.active { border-color: #c9a84c; color: #c9a84c; background: rgba(201,168,76,0.1); }
    .filter-chip.chip-bassa.active { border-color: #6ab882; color: #6ab882; background: rgba(58,122,80,0.1); }

    /* ── BOARD ──────────────────────────────────────────── */
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1a1a1a;
      border-top: 1px solid #1a1a1a;
      min-height: calc(100vh - 140px);
    }

    /* ── COLUMN ─────────────────────────────────────────── */
    .column {
      background: #000;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 141px);
      transition: background 0.15s;
    }

    .column[data-col="todo"]       { border-top: 2px solid #4a7fb5; }
    .column[data-col="inprogress"] { border-top: 2px solid #c9a84c; }
    .column[data-col="test"]       { border-top: 2px solid #7b5ea7; }
    .column[data-col="done"]       { border-top: 2px solid #3a7a50; }
    .column.drag-over              { background: #0c0c0c; }

    .column-header {
      padding: 1.1rem 1.2rem 0.9rem;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .column-title-wrap { display: flex; align-items: center; gap: 0.6rem; }
    .col-line { width: 18px; height: 1px; }

    .column[data-col="todo"]       .col-line { background: #4a7fb5; }
    .column[data-col="inprogress"] .col-line { background: #c9a84c; }
    .column[data-col="test"]       .col-line { background: #7b5ea7; }
    .column[data-col="done"]       .col-line { background: #3a7a50; }

    .column-name {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .column[data-col="todo"]       .column-name { color: #7aabde; }
    .column[data-col="inprogress"] .column-name { color: #c9a84c; }
    .column[data-col="test"]       .column-name { color: #b08ad4; }
    .column[data-col="done"]       .column-name { color: #6ab882; }

    .col-header-right { display: flex; align-items: center; gap: 0.5rem; }

    .column-count {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      color: #555;
      letter-spacing: 0.05em;
    }

    .col-add-btn {
      background: none;
      border: 1px solid #333;
      color: #555;
      cursor: pointer;
      font-size: 0.9rem;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      transition: color 0.1s, border-color 0.1s;
      line-height: 1;
    }

    .col-add-btn:hover { color: #fff; border-color: #fff; }

    /* ── CARDS ───────────────────────────────────────────── */
    .cards-container {
      padding: 0.8rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .card {
      border: 1px solid #222;
      background: #070707;
      padding: 0.85rem 0.95rem;
      cursor: grab;
      transition: border-color 0.15s, transform 0.15s;
      animation: cardIn 0.2s ease;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover { border-color: #555; transform: translateY(-1px); }
    .card.dragging { opacity: 0.3; cursor: grabbing; }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    .card-title {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.78rem;
      line-height: 1.5;
      letter-spacing: 0.04em;
      color: #fff;
      word-break: break-word;
      flex: 1;
    }

    /* ── PRIORITY BADGE ──────────────────────────────────── */
    .priority-badge {
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .priority-alta   { color: #d47a7a; border: 1px solid rgba(212,122,122,0.5); background: rgba(180,60,60,0.12); }
    .priority-media  { color: #c9a84c; border: 1px solid rgba(201,168,76,0.5);  background: rgba(201,168,76,0.12); }
    .priority-bassa  { color: #6ab882; border: 1px solid rgba(106,184,130,0.5); background: rgba(58,122,80,0.12); }

    .card-desc {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.88rem;
      color: #bbb;
      line-height: 1.5;
      word-break: break-word;
      margin-bottom: 0.5rem;
    }

    /* ── CHECKLIST ───────────────────────────────────────── */
    .card-checklist {
      margin-bottom: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      padding: 0.15rem 0;
    }

    .check-box {
      width: 12px;
      height: 12px;
      border: 1px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      flex-shrink: 0;
      transition: background 0.1s, border-color 0.1s;
    }

    .check-item.done .check-box { background: #3a7a50; border-color: #3a7a50; color: #fff; }

    .check-text {
      font-family: 'IM Fell English', serif;
      font-size: 0.82rem;
      color: #999;
      transition: color 0.1s;
    }

    .check-item.done .check-text { text-decoration: line-through; color: #555; }

    /* ── CARD LINK ───────────────────────────────────────── */
    .card-link {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      color: #6ac8c8;
      text-decoration: none;
      margin-bottom: 0.5rem;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-link:hover { color: #8ee8e8; text-decoration: underline; }

    /* ── CARD FOOTER ─────────────────────────────────────── */
    .card-footer {
      margin-top: 0.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-footer-left { display: flex; flex-direction: column; gap: 0.22rem; }

    .card-tag {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      border: 1px solid #333;
      padding: 0.1rem 0.45rem;
      display: inline-block;
    }

    .card-meta-text {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      color: #aaa;
    }

    .card-footer-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.22rem;
    }

    .card-date {
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 0.08em;
      color: #555;
      white-space: nowrap;
    }

    .card-actions {
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.12s;
    }

    .card:hover .card-actions { opacity: 1; }

    .card-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.72rem;
      padding: 0.18rem 0.35rem;
      transition: color 0.1s;
    }

    .card-btn:hover { color: #fff; }
    .card-btn.delete:hover { color: #c04040; }

    .empty-col {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: #2a2a2a;
      font-size: 0.85rem;
      text-align: center;
      padding: 2.5rem 1rem;
    }

    /* ── MODAL ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #080808;
      border: 1px solid #333;
      width: 100%;
      max-width: 440px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2.2rem 2rem;
      transform: translateY(10px);
      transition: transform 0.2s;
      position: relative;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal::before, .modal::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: #444;
      border-style: solid;
    }

    .modal::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
    .modal::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .modal-rule {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.4rem;
    }

    .modal-rule::before, .modal-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }

    .modal-rule span { color: #444; font-size: 0.5rem; letter-spacing: 0.4em; }

    .form-group { margin-bottom: 0.9rem; }

    .form-group label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: #000;
      border: 1px solid #2e2e2e;
      color: #fff;
      font-family: 'IM Fell English', serif;
      font-size: 1rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
      border-radius: 0;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: #666; }

    .form-group select option { background: #080808; }

    /* ── CHECKLIST in MODAL ──────────────────────────────── */
    .modal-checklist-items {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }

    .modal-check-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid #161616;
    }

    .modal-check-row span {
      flex: 1;
      font-family: 'IM Fell English', serif;
      font-size: 0.92rem;
      color: #ccc;
    }

    .modal-check-del {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0.1rem 0.3rem;
      transition: color 0.1s;
    }

    .modal-check-del:hover { color: #d47a7a; }

    .checklist-add-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }

    .checklist-add-row input {
      flex: 1;
      background: #000;
      border: 1px solid #2a2a2a;
      color: #fff;
      font-family: 'IM Fell English', serif;
      font-size: 0.9rem;
      padding: 0.45rem 0.6rem;
      outline: none;
      border-radius: 0;
    }

    .checklist-add-row input:focus { border-color: #555; }

    .btn-add-check {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      background: transparent;
      border: 1px solid #333;
      color: #777;
      padding: 0.45rem 0.7rem;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .btn-add-check:hover { border-color: #888; color: #ccc; }

    /* ── MODAL ACTIONS ───────────────────────────────────── */
    .modal-actions {
      display: flex;
      gap: 0.7rem;
      margin-top: 1.4rem;
    }

    .btn-modal-primary {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.75rem;
      cursor: pointer;
      background: #fff;
      border: 1px solid #fff;
      color: #000;
      transition: background 0.15s;
      border-radius: 0;
    }

    .btn-modal-primary:hover { background: #ddd; }

    .btn-modal-cancel {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.75rem 1.1rem;
      cursor: pointer;
      background: transparent;
      border: 1px solid #2e2e2e;
      color: #555;
      transition: color 0.15s, border-color 0.15s;
      border-radius: 0;
    }

    .btn-modal-cancel:hover { color: #fff; border-color: #555; }

    /* ── CONFIRM MODAL ───────────────────────────────────── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    .confirm-overlay.open { opacity: 1; pointer-events: all; }

    .confirm-box {
      background: #090909;
      border: 1px solid #333;
      padding: 1.8rem 2rem;
      max-width: 320px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    .confirm-box::before, .confirm-box::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: #333; border-style: solid;
    }

    .confirm-box::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
    .confirm-box::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

    .confirm-text {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: #ccc;
      margin-bottom: 1.4rem;
      line-height: 1.6;
    }

    .confirm-actions { display: flex; gap: 0.6rem; justify-content: center; }

    .btn-confirm-yes {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.55rem 1.2rem;
      background: #8b0000;
      border: 1px solid #c04040;
      color: #ffaaaa;
      cursor: pointer;
      transition: background 0.12s;
      border-radius: 0;
    }

    .btn-confirm-yes:hover { background: #a00000; }

    .btn-confirm-no {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.55rem 1.2rem;
      background: transparent;
      border: 1px solid #2e2e2e;
      color: #666;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
      border-radius: 0;
    }

    .btn-confirm-no:hover { color: #fff; border-color: #555; }

    @media (max-width: 900px) { .board { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) {
      .board { grid-template-columns: 1fr; }
      header { padding: 1rem; }
      .filter-bar { padding: 0.7rem 1rem; }
    }
  </style>
</head>

<body>

  <header>
    <span style="font-family:'Cormorant SC','Cormorant',Georgia,serif;font-size:2.6rem;font-weight:600;color:#fff;letter-spacing:0.05em;">Steelboard</span>
    <div class="header-actions">
      <span id="syncStatus" style="font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.1em;color:#555;">○ Caricamento...</span>
      <button class="btn btn-solid" onclick="openModal()">+ Nuova Task</button>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-search">
      <input type="text" id="searchInput" placeholder="Cerca task..." oninput="filterSearch=this.value;render()">
    </div>
    <div class="filter-group">
      <span class="filter-label">Priorità:</span>
      <button class="filter-chip active" id="fp-all"   onclick="setFilterPriority('')">Tutte</button>
      <button class="filter-chip chip-alta"  id="fp-alta"  onclick="setFilterPriority('alta')">Alta</button>
      <button class="filter-chip chip-media" id="fp-media" onclick="setFilterPriority('media')">Media</button>
      <button class="filter-chip chip-bassa" id="fp-bassa" onclick="setFilterPriority('bassa')">Bassa</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">Autore:</span>
      <button class="filter-chip active" id="fa-all"   onclick="setFilterAuthor('')">Tutti</button>
      <button class="filter-chip" id="fa-davi"  onclick="setFilterAuthor('Davi')">Davi</button>
      <button class="filter-chip" id="fa-loris" onclick="setFilterAuthor('Loris')">Loris</button>
      <button class="filter-chip" id="fa-merin" onclick="setFilterAuthor('Merin')">Merin</button>
    </div>
  </div>

  <div class="board" id="board">
    <div class="column" data-col="todo" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap"><div class="col-line"></div><span class="column-name">Da Fare</span></div>
        <div class="col-header-right">
          <span class="column-count" id="count-todo">0</span>
          <button class="col-add-btn" onclick="openModal('todo')">+</button>
        </div>
      </div>
      <div class="cards-container" id="cards-todo"></div>
    </div>

    <div class="column" data-col="inprogress" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap"><div class="col-line"></div><span class="column-name">In Corso</span></div>
        <div class="col-header-right">
          <span class="column-count" id="count-inprogress">0</span>
          <button class="col-add-btn" onclick="openModal('inprogress')">+</button>
        </div>
      </div>
      <div class="cards-container" id="cards-inprogress"></div>
    </div>

    <div class="column" data-col="test" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap"><div class="col-line"></div><span class="column-name">Test</span></div>
        <div class="col-header-right">
          <span class="column-count" id="count-test">0</span>
          <button class="col-add-btn" onclick="openModal('test')">+</button>
        </div>
      </div>
      <div class="cards-container" id="cards-test"></div>
    </div>

    <div class="column" data-col="done" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap"><div class="col-line"></div><span class="column-name">Fatto</span></div>
        <div class="col-header-right">
          <span class="column-count" id="count-done">0</span>
          <button class="col-add-btn" onclick="openModal('done')">+</button>
        </div>
      </div>
      <div class="cards-container" id="cards-done"></div>
    </div>
  </div>

  <!-- MODAL CREA/MODIFICA -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Nuova Task</div>
      <div class="modal-rule"><span>✦</span></div>

      <div class="form-group">
        <label>Titolo *</label>
        <input type="text" id="inputTitle" placeholder="Nome del task..." maxlength="80">
      </div>
      <div class="form-group">
        <label>Descrizione</label>
        <textarea id="inputDesc" rows="3" placeholder="Note aggiuntive..."></textarea>
      </div>
      <div class="form-group">
        <label>Colonna</label>
        <select id="inputCol">
          <option value="todo">Da Fare</option>
          <option value="inprogress">In Corso</option>
          <option value="test">Test</option>
          <option value="done">Fatto</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priorità</label>
        <select id="inputPriority">
          <option value="">— Nessuna —</option>
          <option value="bassa">Bassa</option>
          <option value="media">Media</option>
          <option value="alta">Alta</option>
        </select>
      </div>
      <div class="form-group">
        <label>Creata da</label>
        <select id="inputCreatedBy">
          <option value="Davi">Davi</option>
          <option value="Loris">Loris</option>
          <option value="Merin">Merin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Assegnato a</label>
        <select id="inputAssignedTo">
          <option value="">— Nessuno —</option>
          <option value="Davi">Davi</option>
          <option value="Loris">Loris</option>
          <option value="Merin">Merin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tag &amp; Colore</label>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <input type="text" id="inputTag" placeholder="Es. arte, regole, lore..." maxlength="20" style="flex:1">
          <div id="colorSwatches" style="display:flex;gap:0.35rem;align-items:center;flex-shrink:0;"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Link / URL</label>
        <input type="text" id="inputLink" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>Checklist</label>
        <div class="modal-checklist-items" id="modalChecklistItems"></div>
        <div class="checklist-add-row">
          <input type="text" id="inputCheckItem" placeholder="Aggiungi elemento..." onkeydown="if(event.key==='Enter'){event.preventDefault();addChecklistItem();}">
          <button type="button" class="btn-add-check" onclick="addChecklistItem()">+ Aggiungi</button>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeModal()">Annulla</button>
        <button class="btn-modal-primary" onclick="saveTask()">Salva</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DELETE MODAL -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-text">Eliminare questa task?<br>L'operazione non può essere annullata.</div>
      <div class="confirm-actions">
        <button class="btn-confirm-no" onclick="closeConfirm()">Annulla</button>
        <button class="btn-confirm-yes" onclick="confirmDeleteExec()">Elimina</button>
      </div>
    </div>
  </div>

  <script>
    const COLS = ['todo', 'inprogress', 'test', 'done'];
    let tasks = [], editingId = null, draggedId = null;
    let filterSearch = '', filterPriority = '', filterAuthor = '';
    let pendingDeleteId = null;
    let modalChecklist = [];

    const TAG_COLORS = [
      { id: 'none',   color: '#555',    bg: 'transparent' },
      { id: 'blue',   color: '#7aabde', bg: 'rgba(74,127,181,0.15)' },
      { id: 'gold',   color: '#c9a84c', bg: 'rgba(201,168,76,0.15)' },
      { id: 'purple', color: '#b08ad4', bg: 'rgba(123,94,167,0.15)' },
      { id: 'green',  color: '#6ab882', bg: 'rgba(58,122,80,0.15)' },
      { id: 'red',    color: '#d47a7a', bg: 'rgba(180,60,60,0.15)' },
      { id: 'teal',   color: '#6ac8c8', bg: 'rgba(50,160,160,0.15)' },
      { id: 'orange', color: '#d4a46a', bg: 'rgba(180,130,60,0.15)' },
    ];

    let selectedTagColor = 'none';

    function getTagColorById(id) { return TAG_COLORS.find(c => c.id === id) || TAG_COLORS[0]; }

    function buildSwatches() {
      const container = document.getElementById('colorSwatches');
      container.innerHTML = '';
      TAG_COLORS.forEach(c => {
        const s = document.createElement('div');
        s.dataset.colorId = c.id;
        s.title = c.id;
        s.style.cssText = `width:16px;height:16px;border-radius:50%;cursor:pointer;background:${c.id==='none'?'#222':c.color};border:2px solid ${selectedTagColor===c.id?'#fff':'transparent'};transition:border-color 0.12s;flex-shrink:0;`;
        if (c.id === 'none') s.innerHTML = `<svg viewBox="0 0 12 12" width="10" height="10" style="display:block;margin:1px auto"><line x1="2" y1="2" x2="10" y2="10" stroke="#555" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="#555" stroke-width="1.5"/></svg>`;
        s.onclick = () => { selectedTagColor = c.id; buildSwatches(); };
        container.appendChild(s);
      });
    }

    // ── FILTERS ────────────────────────────────────────────
    function setFilterPriority(val) {
      filterPriority = val;
      document.querySelectorAll('[id^="fp-"]').forEach(b => b.classList.remove('active'));
      document.getElementById(val ? 'fp-' + val : 'fp-all').classList.add('active');
      render();
    }

    function setFilterAuthor(val) {
      filterAuthor = val;
      document.querySelectorAll('[id^="fa-"]').forEach(b => b.classList.remove('active'));
      document.getElementById(val ? 'fa-' + val.toLowerCase() : 'fa-all').classList.add('active');
      render();
    }

    function applyFilters(colTasks) {
      return colTasks.filter(t => {
        if (filterSearch) {
          const q = filterSearch.toLowerCase();
          if (!t.title.toLowerCase().includes(q) && !(t.desc || '').toLowerCase().includes(q)) return false;
        }
        if (filterPriority && t.priority !== filterPriority) return false;
        if (filterAuthor && t.createdBy !== filterAuthor) return false;
        return true;
      });
    }

    // ── CHECKLIST IN MODAL ─────────────────────────────────
    function renderModalChecklist() {
      const container = document.getElementById('modalChecklistItems');
      container.innerHTML = '';
      modalChecklist.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'modal-check-row';
        row.innerHTML = `<span>${esc(item.text)}</span><button class="modal-check-del" onclick="removeChecklistItem(${i})">✕</button>`;
        container.appendChild(row);
      });
    }

    function addChecklistItem() {
      const input = document.getElementById('inputCheckItem');
      const text = input.value.trim();
      if (!text) return;
      modalChecklist.push({ text, done: false });
      input.value = '';
      renderModalChecklist();
    }

    function removeChecklistItem(i) {
      modalChecklist.splice(i, 1);
      renderModalChecklist();
    }

    // ── TOGGLE CHECKLIST ITEM ON CARD ──────────────────────
    function toggleCheck(taskId, itemIndex) {
      const t = tasks.find(x => x.id === taskId);
      if (t && t.checklist && t.checklist[itemIndex] !== undefined) {
        t.checklist[itemIndex].done = !t.checklist[itemIndex].done;
        save(); render();
      }
    }

    // ── CONFIRM DELETE ─────────────────────────────────────
    function confirmDelete(id) {
      pendingDeleteId = id;
      document.getElementById('confirmOverlay').classList.add('open');
    }

    function closeConfirm() {
      pendingDeleteId = null;
      document.getElementById('confirmOverlay').classList.remove('open');
    }

    function confirmDeleteExec() {
      if (pendingDeleteId) { tasks = tasks.filter(t => t.id !== pendingDeleteId); save(); render(); }
      closeConfirm();
    }

    // ── JSONBIN ────────────────────────────────────────────
    const JSONBIN_BIN_ID  = '69a483a3ae596e708f559b82';
    const JSONBIN_API_KEY = '$2a$10$p0kUTLR9by4mVs8qmR0BRuFhUOYeqqvvD10r3MqczrHT1cWdDy4.y';
    const JSONBIN_URL     = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
    let lastSavedHash = '';

    async function save() {
      try {
        setStatus('saving');
        const data = JSON.stringify(tasks);
        await fetch(JSONBIN_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Versioning': 'false' },
          body: JSON.stringify({ tasks })
        });
        lastSavedHash = data;
        setStatus('synced');
      } catch (e) { console.warn('save error', e); setStatus('error'); }
    }

    async function load() {
      try {
        const res  = await fetch(JSONBIN_URL + '/latest', { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
        const json = await res.json();
        tasks = json.record?.tasks || [];
        lastSavedHash = JSON.stringify(tasks);
      } catch (e) { tasks = []; }
    }

    async function pollRemote() {
      try {
        const res    = await fetch(JSONBIN_URL + '/latest', { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
        const json   = await res.json();
        const remote = JSON.stringify(json.record?.tasks || []);
        if (remote !== lastSavedHash) { tasks = json.record?.tasks || []; lastSavedHash = remote; render(); }
      } catch (e) {}
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── RENDER ─────────────────────────────────────────────
    function render() {
      COLS.forEach(col => {
        const container = document.getElementById('cards-' + col);
        const allColTasks  = tasks.filter(t => t.col === col);
        const colTasks     = applyFilters(allColTasks);
        document.getElementById('count-' + col).textContent = allColTasks.length;
        container.innerHTML = '';
        if (colTasks.length === 0) { container.innerHTML = '<div class="empty-col">Nessuna task</div>'; return; }

        colTasks.forEach(t => {
          const card = document.createElement('div');
          card.className = 'card';
          card.draggable = true;
          card.dataset.id = t.id;
          card.ondragstart = e => onDragStart(e, t.id);
          card.ondragend   = onDragEnd;
          card.ondblclick  = () => openModal(t.col, t.id);

          const tagC = getTagColorById(t.tagColor || 'none');
          const priorityLabels = { alta: 'Alta', media: 'Media', bassa: 'Bassa' };

          const checklistHtml = (t.checklist && t.checklist.length)
            ? `<div class="card-checklist">${t.checklist.map((item, i) =>
                `<div class="check-item${item.done ? ' done' : ''}" onclick="event.stopPropagation();toggleCheck('${t.id}',${i})">
                  <div class="check-box">${item.done ? '✓' : ''}</div>
                  <span class="check-text">${esc(item.text)}</span>
                </div>`).join('')}</div>`
            : '';

          const linkHtml = t.link
            ? `<a href="${esc(t.link)}" target="_blank" class="card-link" onclick="event.stopPropagation()">🔗 ${esc(t.link.replace(/^https?:\/\//, ''))}</a>`
            : '';

          card.innerHTML = `
            <div class="card-header-row">
              <div class="card-title">${esc(t.title)}</div>
              ${t.priority ? `<span class="priority-badge priority-${t.priority}">${priorityLabels[t.priority]}</span>` : ''}
            </div>
            ${t.desc ? `<div class="card-desc">${esc(t.desc)}</div>` : ''}
            ${checklistHtml}
            ${linkHtml}
            <div class="card-footer">
              <div class="card-footer-left">
                ${t.tag ? `<span class="card-tag" style="color:${tagC.color};background:${tagC.bg};border-color:${tagC.id==='none'?'#333':tagC.color}">${esc(t.tag)}</span>` : '<span></span>'}
                ${t.createdBy ? `<span class="card-meta-text">da ${esc(t.createdBy)}</span>` : ''}
                ${t.assignedTo ? `<span class="card-meta-text" style="color:#888;">→ ${esc(t.assignedTo)}</span>` : ''}
              </div>
              <div class="card-footer-right">
                ${t.createdAt ? `<span class="card-date">Creata il: ${esc(t.createdAt)}</span>` : ''}
                <div class="card-actions">
                  <button class="card-btn" onclick="openModal('${col}','${t.id}')">✎</button>
                  <button class="card-btn delete" onclick="confirmDelete('${t.id}')">✕</button>
                </div>
              </div>
            </div>`;
          container.appendChild(card);
        });
      });
    }

    // ── MODAL OPEN/CLOSE ────────────────────────────────────
    function openModal(col, id) {
      editingId = id || null;
      document.getElementById('modalTitle').textContent = id ? 'Modifica Task' : 'Nuova Task';
      if (id) {
        const t = tasks.find(x => x.id === id);
        document.getElementById('inputTitle').value      = t.title;
        document.getElementById('inputDesc').value       = t.desc || '';
        document.getElementById('inputCol').value        = t.col;
        document.getElementById('inputPriority').value   = t.priority || '';
        document.getElementById('inputCreatedBy').value  = t.createdBy || 'Davi';
        document.getElementById('inputAssignedTo').value = t.assignedTo || '';
        document.getElementById('inputTag').value        = t.tag || '';
        document.getElementById('inputLink').value       = t.link || '';
        selectedTagColor = t.tagColor || 'none';
        modalChecklist = (t.checklist || []).map(c => ({ ...c }));
      } else {
        document.getElementById('inputTitle').value      = '';
        document.getElementById('inputDesc').value       = '';
        document.getElementById('inputCol').value        = col || 'todo';
        document.getElementById('inputPriority').value   = '';
        document.getElementById('inputCreatedBy').value  = 'Davi';
        document.getElementById('inputAssignedTo').value = '';
        document.getElementById('inputTag').value        = '';
        document.getElementById('inputLink').value       = '';
        selectedTagColor = 'none';
        modalChecklist = [];
      }
      renderModalChecklist();
      buildSwatches();
      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('inputTitle').focus(), 150);
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
    function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

    // ── SAVE TASK ───────────────────────────────────────────
    function saveTask() {
      const title = document.getElementById('inputTitle').value.trim();
      if (!title) {
        document.getElementById('inputTitle').style.borderColor = '#800';
        document.getElementById('inputTitle').focus();
        setTimeout(() => document.getElementById('inputTitle').style.borderColor = '', 900);
        return;
      }
      const col        = document.getElementById('inputCol').value;
      const desc       = document.getElementById('inputDesc').value.trim();
      const priority   = document.getElementById('inputPriority').value;
      const createdBy  = document.getElementById('inputCreatedBy').value;
      const assignedTo = document.getElementById('inputAssignedTo').value;
      const tag        = document.getElementById('inputTag').value.trim();
      const tagColor   = selectedTagColor;
      const link       = document.getElementById('inputLink').value.trim();
      const checklist  = modalChecklist.map(c => ({ ...c }));

      if (editingId) {
        Object.assign(tasks.find(x => x.id === editingId), { title, col, desc, priority, createdBy, assignedTo, tag, tagColor, link, checklist });
      } else {
        const now = new Date();
        const createdAt = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        tasks.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), title, col, desc, priority, createdBy, assignedTo, tag, tagColor, link, checklist, createdAt });
      }
      save(); render(); closeModal();
    }

    // ── DRAG & DROP ─────────────────────────────────────────
    function onDragStart(e, id) {
      draggedId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => document.querySelector(`[data-id="${id}"]`)?.classList.add('dragging'), 0);
    }
    function onDragEnd() {
      document.querySelectorAll('.card.dragging').forEach(c => c.classList.remove('dragging'));
      document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
      draggedId = null;
    }
    function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function onDragLeave(e) { if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over'); }
    function onDrop(e) {
      e.preventDefault();
      const col = e.currentTarget.dataset.col;
      if (draggedId && col) { const t = tasks.find(x => x.id === draggedId); if (t) { t.col = col; save(); render(); } }
      e.currentTarget.classList.remove('drag-over');
    }

    // ── KEYBOARD ────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeConfirm(); }
      if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open') && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.id !== 'inputCheckItem') saveTask();
      if (e.key === 'n' && !document.getElementById('modalOverlay').classList.contains('open') && document.activeElement.tagName === 'BODY') openModal();
    });

    // ── INIT ────────────────────────────────────────────────
    (async () => {
      setStatus('loading');
      await load();
      render();
      setStatus('synced');
      setInterval(pollRemote, 3000);
    })();

    function setStatus(state) {
      const el = document.getElementById('syncStatus');
      if (!el) return;
      if (state === 'loading') { el.textContent = '○ Caricamento...'; el.style.color = '#555'; }
      else if (state === 'synced')  { el.textContent = '● Live';          el.style.color = '#6ab882'; }
      else if (state === 'saving')  { el.textContent = '◌ Salvataggio...'; el.style.color = '#c9a84c'; }
      else if (state === 'error')   { el.textContent = '✕ Errore sync';   el.style.color = '#d47a7a'; }
    }
  </script>
</body>

</html>
