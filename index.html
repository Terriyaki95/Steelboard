<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steelboard</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;700;900&family=Cormorant+SC:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── CSS VARIABLES ───────────────────────────────────── */
    :root {
      --bg:           #000;
      --bg-surface:   #070707;
      --bg-elevated:  #080808;
      --bg-subtle:    #030303;
      --bg-input:     #000;
      --border-s:     #333;
      --border-m:     #222;
      --border-xs:    #1a1a1a;
      --border-inp:   #2e2e2e;
      --t1:           #fff;
      --t2:           #bbb;
      --t3:           #aaa;
      --tm:           #555;
      --tf:           #2a2a2a;
      --overlay:      rgba(0,0,0,0.9);
    }
    [data-theme="light"] {
      --bg:           #f0ebe4;
      --bg-surface:   #faf8f5;
      --bg-elevated:  #fefcfa;
      --bg-subtle:    #e8e2db;
      --bg-input:     #fff;
      --border-s:     #b0a89e;
      --border-m:     #cec8c0;
      --border-xs:    #ddd7ce;
      --border-inp:   #c0b9b0;
      --t1:           #1a1512;
      --t2:           #3a3530;
      --t3:           #5a5550;
      --tm:           #8a8580;
      --tf:           #c0b9b0;
      --overlay:      rgba(30,25,20,0.85);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'IM Fell English', serif;
      min-height: 100vh;
      overflow-x: auto;
      transition: background 0.2s, color 0.2s;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.3rem 2.5rem;
      border-bottom: 1px solid var(--border-s);
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--bg);
    }

    .header-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

    .btn {
      font-family: 'Cinzel', serif;
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.42rem 0.9rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-solid { background: var(--t1); border: 1px solid var(--t1); color: var(--bg); }
    .btn-solid:hover { opacity: 0.85; }
    .btn-ghost { background: transparent; border: 1px solid var(--border-s); color: var(--tm); }
    .btn-ghost:hover { border-color: var(--t3); color: var(--t1); }

    /* ── FILTER BAR ──────────────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      padding: 0.55rem 2.5rem;
      border-bottom: 1px solid var(--border-xs);
      flex-wrap: wrap;
      background: var(--bg-subtle);
    }
    .filter-search input {
      background: var(--bg-input);
      border: 1px solid var(--border-inp);
      color: var(--t1);
      font-family: 'IM Fell English', serif;
      font-size: 0.84rem;
      padding: 0.28rem 0.65rem;
      outline: none;
      width: 172px;
      transition: border-color 0.15s;
      border-radius: 0;
    }
    .filter-search input:focus { border-color: var(--tm); }
    .filter-search input::placeholder { color: var(--tm); }

    .filter-group { display: flex; align-items: center; gap: 0.3rem; }
    .filter-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--t1);
    }
    .filter-chip {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.16rem 0.45rem;
      border: 1px solid var(--border-xs);
      background: transparent;
      color: var(--t1);
      cursor: pointer;
      transition: all 0.12s;
      border-radius: 2px;
    }
    .filter-chip:hover { border-color: var(--t1); color: var(--t1); }
    .filter-chip.active { border-color: var(--tm); color: var(--t2); background: var(--bg-surface); }
    .filter-chip.chip-alta.active  { border-color: #d47a7a; color: #d47a7a; background: rgba(180,60,60,0.1); }
    .filter-chip.chip-media.active { border-color: #c9a84c; color: #c9a84c; background: rgba(201,168,76,0.1); }
    .filter-chip.chip-bassa.active { border-color: #6ab882; color: #6ab882; background: rgba(58,122,80,0.1); }

    /* ── SPRINT PANEL ───────────────────────────────────── */
    .sprint-panel {
      border-bottom: 1px solid var(--border-xs);
      background: var(--bg-subtle);
    }
    .sprint-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 2.5rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }
    .sprint-header:hover { background: var(--bg-surface); }
    .sprint-label {
      font-family: 'Cinzel', serif;
      font-size: 0.53rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--tf);
      margin-right: 0.7rem;
    }
    .sprint-week {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--t2);
    }
    .sprint-toggle {
      font-size: 0.55rem;
      color: var(--tm);
      transition: transform 0.2s;
    }
    .sprint-panel:not(.collapsed) .sprint-toggle { transform: rotate(90deg); }
    .sprint-body {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border-xs);
      overflow: hidden;
    }
    .sprint-panel.collapsed .sprint-body { display: none; }
    .sprint-col {
      flex: 1;
      padding: 0.55rem 1.2rem 0.65rem;
      border-right: 1px solid var(--border-xs);
    }
    .sprint-col:last-child { border-right: none; }
    .sprint-col-name {
      font-family: 'Cinzel', serif;
      font-size: 0.48rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .sprint-col[data-col="todo"]       .sprint-col-name { color: #4a7fb5; }
    .sprint-col[data-col="inprogress"] .sprint-col-name { color: #c9a84c; }
    .sprint-col[data-col="test"]       .sprint-col-name { color: #9b7ec8; }
    .sprint-col[data-col="done"]       .sprint-col-name { color: #6ab882; }
    .sprint-task-list { display: flex; flex-direction: column; gap: 0.22rem; }
    .sprint-task-item {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--t2);
      padding: 0.08rem 0;
      line-height: 1.4;
    }
    .sprint-task-item::before { content: '· '; color: var(--tm); }
    .sprint-empty {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      color: var(--tm);
      font-style: italic;
    }

    /* ── DEVLOG BUTTON ───────────────────────────────────── */
    .col-devlog-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      background: transparent;
      border: 1px solid var(--border-m);
      color: #3a7a50;
      width: 20px;
      height: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 2px;
      margin-right: 0.3rem;
      flex-shrink: 0;
    }
    .col-devlog-btn:hover { border-color: #3a7a50; background: rgba(58,122,80,0.12); color: #6ab882; }

    /* ── BOARD ──────────────────────────────────────────── */
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border-xs);
      min-height: calc(100vh - 138px);
    }

    /* ── COLUMN ─────────────────────────────────────────── */
    .column {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 139px);
      transition: background 0.15s;
    }
    .column[data-col="todo"]       { border-top: 2px solid #4a7fb5; }
    .column[data-col="inprogress"] { border-top: 2px solid #c9a84c; }
    .column[data-col="test"]       { border-top: 2px solid #7b5ea7; }
    .column[data-col="done"]       { border-top: 2px solid #3a7a50; }
    .column.drag-over              { background: var(--bg-surface); }

    .column-header {
      padding: 1rem 1.2rem 0.8rem;
      border-bottom: 1px solid var(--border-xs);
      display: flex; align-items: center; justify-content: space-between;
    }
    .column-title-wrap { display: flex; align-items: center; gap: 0.6rem; }
    .col-line { width: 18px; height: 1px; }
    .column[data-col="todo"]       .col-line { background: #4a7fb5; }
    .column[data-col="inprogress"] .col-line { background: #c9a84c; }
    .column[data-col="test"]       .col-line { background: #7b5ea7; }
    .column[data-col="done"]       .col-line { background: #3a7a50; }

    .column-name {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .column[data-col="todo"]       .column-name { color: #7aabde; }
    .column[data-col="inprogress"] .column-name { color: #c9a84c; }
    .column[data-col="test"]       .column-name { color: #b08ad4; }
    .column[data-col="done"]       .column-name { color: #6ab882; }

    .col-header-right { display: flex; align-items: center; gap: 0.5rem; }
    .column-count { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--tm); letter-spacing: 0.05em; }
    .col-add-btn {
      background: none; border: 1px solid var(--border-m); color: var(--tm);
      cursor: pointer; font-size: 0.9rem; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 2px; transition: color 0.1s, border-color 0.1s; line-height: 1;
    }
    .col-add-btn:hover { color: var(--t1); border-color: var(--t1); }

    /* ── CARDS ───────────────────────────────────────────── */
    .cards-container { padding: 0.8rem; flex: 1; display: flex; flex-direction: column; gap: 0.6rem; }

    .card {
      border: 1px solid var(--border-m);
      background: var(--bg-surface);
      padding: 0.78rem 0.88rem;
      cursor: grab;
      transition: border-color 0.15s, transform 0.15s;
      animation: cardIn 0.2s ease;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:hover { border-color: var(--tm); transform: translateY(-1px); }
    .card.dragging { opacity: 0.3; cursor: grabbing; }

    .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.32rem; }
    .card-title { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.8rem; line-height: 1.45; letter-spacing: 0; color: var(--t1); word-break: break-word; flex: 1; }

    .priority-badge { font-family: 'Cinzel', serif; font-size: 0.49rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.09rem 0.36rem; border-radius: 2px; flex-shrink: 0; }
    .priority-alta  { color: #d47a7a; border: 1px solid rgba(212,122,122,0.5); background: rgba(180,60,60,0.12); }
    .priority-media { color: #c9a84c; border: 1px solid rgba(201,168,76,0.5);  background: rgba(201,168,76,0.12); }
    .priority-bassa { color: #6ab882; border: 1px solid rgba(106,184,130,0.5); background: rgba(58,122,80,0.12); }

    .card-desc { font-family: 'Inter', sans-serif; font-style: normal; font-size: 0.79rem; color: var(--t2); line-height: 1.55; word-break: break-word; margin-bottom: 0.42rem; }

    /* TAGS */
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.22rem; margin-bottom: 0.38rem; }
    .card-tag { font-family: 'Cinzel', serif; font-size: 0.54rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.07rem 0.38rem; border: 1px solid var(--border-m); color: var(--tm); }

    /* CHECKLIST */
    .card-checklist { margin-bottom: 0.42rem; display: flex; flex-direction: column; gap: 0.16rem; }
    .check-item { display: flex; align-items: center; gap: 0.38rem; cursor: pointer; padding: 0.1rem 0; }
    .check-box { width: 11px; height: 11px; border: 1px solid var(--border-s); display: flex; align-items: center; justify-content: center; font-size: 0.48rem; flex-shrink: 0; transition: background 0.1s, border-color 0.1s; }
    .check-item.done .check-box { background: #3a7a50; border-color: #3a7a50; color: #fff; }
    .check-text { font-family: 'Inter', sans-serif; font-size: 0.76rem; color: var(--t3); }
    .check-item.done .check-text { text-decoration: line-through; color: var(--tm); }

    /* LINK */
    .card-link { display: inline-block; font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.08em; color: #6ac8c8; text-decoration: none; margin-bottom: 0.38rem; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-link:hover { text-decoration: underline; }

    /* COMMENTS HINT */
    .card-comments-hint { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 0.08em; color: var(--tm); margin-bottom: 0.38rem; }

    /* FOOTER */
    .card-footer { margin-top: 0.42rem; display: flex; align-items: flex-end; justify-content: space-between; gap: 0.5rem; }
    .card-footer-left { display: flex; flex-direction: column; gap: 0.18rem; }
    .card-meta-text { font-family: 'Cinzel', serif; font-size: 0.51rem; letter-spacing: 0.08em; color: var(--t3); }
    .card-footer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.18rem; }
    .card-date { font-family: 'Cinzel', serif; font-size: 0.49rem; letter-spacing: 0.07em; color: var(--tm); white-space: nowrap; }
    .card-actions { display: flex; gap: 0.25rem; opacity: 0; transition: opacity 0.12s; }
    .card:hover .card-actions { opacity: 1; }
    .card-btn { background: none; border: none; color: var(--tm); cursor: pointer; font-size: 0.7rem; padding: 0.15rem 0.3rem; transition: color 0.1s; }
    .card-btn:hover { color: var(--t1); }
    .card-btn.delete:hover { color: #c04040; }

    .card.drop-before { box-shadow: 0 -2px 0 #c9a84c; }
    .card.drop-after  { box-shadow: 0  2px 0 #c9a84c; }

    .empty-col { font-family: 'IM Fell English', serif; font-style: italic; color: var(--tf); font-size: 0.85rem; text-align: center; padding: 2.5rem 1rem; }

    /* ── MODAL ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: var(--overlay); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.18s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-elevated); border: 1px solid var(--border-s);
      width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto;
      padding: 1.9rem 1.8rem; transform: translateY(10px); transition: transform 0.2s; position: relative;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal::before, .modal::after { content: ''; position: absolute; width: 12px; height: 12px; border-color: var(--border-s); border-style: solid; }
    .modal::before { top: 7px; left: 7px; border-width: 1px 0 0 1px; }
    .modal::after  { bottom: 7px; right: 7px; border-width: 0 1px 1px 0; }

    .modal-title { font-family: 'Cinzel', serif; font-size: 0.93rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; color: var(--t1); margin-bottom: 0.3rem; }
    .modal-rule { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.1rem; }
    .modal-rule::before, .modal-rule::after { content: ''; flex: 1; height: 1px; background: var(--border-xs); }
    .modal-rule span { color: var(--tf); font-size: 0.5rem; letter-spacing: 0.4em; }

    .form-group { margin-bottom: 0.82rem; }
    .form-group label { display: block; font-family: 'Cinzel', serif; font-size: 0.57rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--tm); margin-bottom: 0.32rem; }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border-inp);
      color: var(--t1); font-family: 'IM Fell English', serif; font-size: 0.95rem;
      padding: 0.52rem 0.72rem; outline: none; transition: border-color 0.15s; resize: vertical; border-radius: 0;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--tm); }
    .form-group select option { background: var(--bg-elevated); }

    /* TAGS IN MODAL */
    .modal-tags-list { display: flex; flex-wrap: wrap; gap: 0.32rem; margin-bottom: 0.4rem; min-height: 0; }
    .modal-tag-pill { display: flex; align-items: center; gap: 0.28rem; font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.1em; padding: 0.13rem 0.45rem; border: 1px solid var(--border-s); background: var(--bg-surface); color: var(--t2); }
    .modal-tag-pill button { background: none; border: none; color: var(--tm); cursor: pointer; font-size: 0.58rem; padding: 0 0.1rem; line-height: 1; }
    .modal-tag-pill button:hover { color: #d47a7a; }

    .tag-add-row { display: flex; gap: 0.38rem; align-items: center; }
    .tag-add-row input { flex: 1; font-size: 0.9rem; padding: 0.42rem 0.62rem !important; }
    .btn-add-tag { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.1em; background: transparent; border: 1px solid var(--border-s); color: var(--tm); padding: 0.42rem 0.62rem; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
    .btn-add-tag:hover { border-color: var(--t3); color: var(--t2); }

    /* CHECKLIST IN MODAL */
    .modal-checklist-items { display: flex; flex-direction: column; gap: 0.22rem; margin-bottom: 0.38rem; }
    .modal-check-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.26rem 0; border-bottom: 1px solid var(--border-xs); }
    .modal-check-row span { flex: 1; font-family: 'IM Fell English', serif; font-size: 0.9rem; color: var(--t2); }
    .modal-check-del { background: none; border: none; color: var(--tm); cursor: pointer; font-size: 0.63rem; padding: 0.1rem 0.28rem; transition: color 0.1s; }
    .modal-check-del:hover { color: #d47a7a; }

    .checklist-add-row { display: flex; gap: 0.38rem; margin-top: 0.28rem; }
    .checklist-add-row input { flex: 1; font-size: 0.9rem; padding: 0.4rem 0.58rem !important; }
    .btn-add-check { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.1em; background: transparent; border: 1px solid var(--border-s); color: var(--tm); padding: 0.4rem 0.62rem; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
    .btn-add-check:hover { border-color: var(--t3); color: var(--t2); }

    /* COMMENTS */
    .modal-section-divider { height: 1px; background: var(--border-xs); margin: 1rem 0 0.8rem; }
    .modal-section-label { font-family: 'Cinzel', serif; font-size: 0.57rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--tm); margin-bottom: 0.65rem; }

    .comment-list { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 0.6rem; }
    .comment-item { background: var(--bg-subtle); border: 1px solid var(--border-xs); padding: 0.48rem 0.62rem; }
    .comment-header { display: flex; justify-content: space-between; margin-bottom: 0.18rem; }
    .comment-author { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.1em; color: var(--t3); }
    .comment-time   { font-family: 'Cinzel', serif; font-size: 0.5rem; color: var(--tm); }
    .comment-text   { font-family: 'IM Fell English', serif; font-size: 0.87rem; color: var(--t2); line-height: 1.5; }
    .comment-empty  { font-family: 'IM Fell English', serif; font-style: italic; font-size: 0.85rem; color: var(--tm); padding: 0.2rem 0 0.4rem; }

    .comment-add-row { display: flex; gap: 0.38rem; align-items: flex-end; }
    .comment-add-row textarea { flex: 1; font-size: 0.9rem; padding: 0.42rem 0.62rem !important; resize: none; min-height: 56px; }
    .btn-add-comment { font-family: 'Cinzel', serif; font-size: 0.54rem; letter-spacing: 0.1em; background: transparent; border: 1px solid var(--border-s); color: var(--tm); padding: 0.42rem 0.7rem; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
    .btn-add-comment:hover { border-color: var(--t3); color: var(--t2); }

    /* MODAL ACTIONS */
    .modal-actions { display: flex; gap: 0.7rem; margin-top: 1.1rem; }
    .btn-modal-primary { flex: 1; font-family: 'Cinzel', serif; font-weight: 700; font-size: 0.67rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.7rem; cursor: pointer; background: var(--t1); border: 1px solid var(--t1); color: var(--bg); transition: opacity 0.15s; border-radius: 0; }
    .btn-modal-primary:hover { opacity: 0.85; }
    .btn-modal-cancel { font-family: 'Cinzel', serif; font-size: 0.63rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.7rem 1.05rem; cursor: pointer; background: transparent; border: 1px solid var(--border-inp); color: var(--tm); transition: color 0.15s, border-color 0.15s; border-radius: 0; }
    .btn-modal-cancel:hover { color: var(--t1); border-color: var(--tm); }

    /* ── CONFIRM ─────────────────────────────────────────── */
    .confirm-overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-box { background: var(--bg-elevated); border: 1px solid var(--border-s); padding: 1.7rem 1.9rem; max-width: 308px; width: 100%; text-align: center; }
    .confirm-text { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--t2); margin-bottom: 1.2rem; line-height: 1.7; }
    .confirm-actions { display: flex; gap: 0.55rem; justify-content: center; }
    .btn-confirm-yes { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.48rem 1.1rem; background: #8b0000; border: 1px solid #c04040; color: #ffaaaa; cursor: pointer; border-radius: 0; }
    .btn-confirm-yes:hover { background: #a00000; }
    .btn-confirm-no  { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.48rem 1.1rem; background: transparent; border: 1px solid var(--border-inp); color: var(--tm); cursor: pointer; border-radius: 0; }
    .btn-confirm-no:hover { color: var(--t1); border-color: var(--tm); }

    /* ── LOG DRAWER ──────────────────────────────────────── */
    .log-drawer {
      position: fixed; top: 0; right: -360px; width: 340px; height: 100vh;
      background: var(--bg-elevated); border-left: 1px solid var(--border-s);
      z-index: 250; display: flex; flex-direction: column; transition: right 0.25s ease;
    }
    .log-drawer.open { right: 0; }
    .log-drawer-header { padding: 1.1rem 1.3rem; border-bottom: 1px solid var(--border-xs); display: flex; justify-content: space-between; align-items: center; }
    .log-drawer-title { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--t1); }
    .log-close { background: none; border: none; color: var(--tm); cursor: pointer; font-size: 0.9rem; padding: 0.2rem 0.4rem; transition: color 0.1s; }
    .log-close:hover { color: var(--t1); }
    .log-list { flex: 1; overflow-y: auto; padding: 0.75rem 1.3rem; display: flex; flex-direction: column; gap: 0; }
    .log-entry { padding: 0.45rem 0; border-bottom: 1px solid var(--border-xs); display: flex; flex-direction: column; gap: 0.12rem; }
    .log-time { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 0.1em; color: var(--tm); }
    .log-text { font-family: 'IM Fell English', serif; font-size: 0.87rem; color: var(--t2); }
    .log-empty { font-family: 'IM Fell English', serif; font-style: italic; color: var(--tf); font-size: 0.85rem; text-align: center; padding: 2rem; }

    /* ── ARCHIVE MODAL ───────────────────────────────────── */
    .archive-overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.18s; }
    .archive-overlay.open { opacity: 1; pointer-events: all; }
    .archive-modal { background: var(--bg-elevated); border: 1px solid var(--border-s); width: 100%; max-width: 660px; max-height: 82vh; display: flex; flex-direction: column; }
    .archive-header { padding: 1.4rem 1.8rem; border-bottom: 1px solid var(--border-xs); display: flex; justify-content: space-between; align-items: center; }
    .archive-title { font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--t1); }
    .archive-subtitle { font-family: 'IM Fell English', serif; font-style: italic; font-size: 0.82rem; color: var(--tm); margin-top: 0.15rem; }
    .archive-close { background: none; border: none; color: var(--tm); cursor: pointer; font-size: 1rem; transition: color 0.1s; }
    .archive-close:hover { color: var(--t1); }
    .archive-list { flex: 1; overflow-y: auto; padding: 0.9rem 1.4rem; display: flex; flex-direction: column; gap: 0.45rem; }
    .archive-card { border: 1px solid var(--border-xs); background: var(--bg-surface); padding: 0.72rem 0.9rem; display: flex; align-items: center; gap: 0.9rem; }
    .archive-card-info { flex: 1; }
    .archive-card-title { font-family: 'Cinzel', serif; font-size: 0.73rem; color: var(--t1); letter-spacing: 0.05em; margin-bottom: 0.18rem; }
    .archive-card-meta  { font-family: 'IM Fell English', serif; font-size: 0.81rem; color: var(--tm); font-style: italic; }
    .btn-restore { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.32rem 0.75rem; background: transparent; border: 1px solid var(--border-s); color: var(--tm); cursor: pointer; transition: all 0.12s; white-space: nowrap; border-radius: 0; }
    .btn-restore:hover { border-color: var(--t3); color: var(--t2); }
    .archive-empty { font-family: 'IM Fell English', serif; font-style: italic; color: var(--tf); font-size: 0.9rem; text-align: center; padding: 3rem; }

    @media (max-width: 900px) { .board { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) {
      .board { grid-template-columns: 1fr; }
      header, .filter-bar { padding: 0.8rem 1rem; }
      .log-drawer { width: 100%; right: -100%; }
    }
  </style>
</head>

<body>

  <header>
    <span style="font-family:'Cormorant SC','Cormorant',Georgia,serif;font-size:2.5rem;font-weight:600;color:var(--t1);letter-spacing:0.05em;">Steelboard</span>
    <div class="header-actions">
      <span id="syncStatus" style="font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.1em;color:var(--tm);">○ Caricamento...</span>
      <button class="btn btn-ghost" onclick="openArchive()">⊡ Archivio</button>
      <button class="btn btn-ghost" onclick="toggleLog()">≡ Log</button>
      <button class="btn btn-ghost" id="themeBtn" onclick="toggleTheme()">☀ Chiaro</button>
      <button class="btn btn-solid" onclick="openModal()">+ Nuova Task</button>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-search">
      <input type="text" id="searchInput" placeholder="Cerca task..." oninput="filterSearch=this.value;render()">
    </div>
    <div class="filter-group">
      <span class="filter-label">Priorità:</span>
      <button class="filter-chip active"    id="fp-all"   onclick="setFilterPriority('')">Tutte</button>
      <button class="filter-chip chip-alta" id="fp-alta"  onclick="setFilterPriority('alta')">Alta</button>
      <button class="filter-chip chip-media"id="fp-media" onclick="setFilterPriority('media')">Media</button>
      <button class="filter-chip chip-bassa"id="fp-bassa" onclick="setFilterPriority('bassa')">Bassa</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">Autore:</span>
      <button class="filter-chip active" id="fa-all"   onclick="setFilterAuthor('')">Tutti</button>
      <button class="filter-chip"        id="fa-davi"  onclick="setFilterAuthor('Davi')">Davi</button>
      <button class="filter-chip"        id="fa-loris" onclick="setFilterAuthor('Loris')">Loris</button>
      <button class="filter-chip"        id="fa-merin" onclick="setFilterAuthor('Merin')">Merin</button>
    </div>
  </div>

  <!-- SPRINT PANEL -->
  <div class="sprint-panel collapsed" id="sprint-panel">
    <div class="sprint-header" onclick="toggleSprint()">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span class="sprint-week" id="sprint-week-label"></span>
      </div>
      <span class="sprint-toggle" id="sprint-toggle">▶</span>
    </div>
    <div class="sprint-body" id="sprint-body"></div>
  </div>

  <!-- BOARD -->
  <div class="board" id="board">
    <div class="column" data-col="todo" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap"><div class="col-line"></div><span class="column-name">Da Fare</span></div>
        <div class="col-header-right"><span class="column-count" id="count-todo">0</span><button class="col-add-btn" onclick="openModal('todo')">+</button></div>
      </div>
      <div class="cards-container" id="cards-todo"></div>
    </div>
    <div class="column" data-col="inprogress" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap"><div class="col-line"></div><span class="column-name">In Corso</span></div>
        <div class="col-header-right"><span class="column-count" id="count-inprogress">0</span><button class="col-add-btn" onclick="openModal('inprogress')">+</button></div>
      </div>
      <div class="cards-container" id="cards-inprogress"></div>
    </div>
    <div class="column" data-col="test" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap"><div class="col-line"></div><span class="column-name">Test</span></div>
        <div class="col-header-right"><span class="column-count" id="count-test">0</span><button class="col-add-btn" onclick="openModal('test')">+</button></div>
      </div>
      <div class="cards-container" id="cards-test"></div>
    </div>
    <div class="column" data-col="done" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap"><div class="col-line"></div><span class="column-name">Fatto</span></div>
        <div class="col-header-right"><span class="column-count" id="count-done">0</span><button class="col-devlog-btn" onclick="downloadDevlog()" title="Download Devlog .md">↓</button><button class="col-add-btn" onclick="openModal('done')">+</button></div>
      </div>
      <div class="cards-container" id="cards-done"></div>
    </div>
  </div>

  <!-- TASK MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Nuova Task</div>
      <div class="modal-rule"><span>✦</span></div>

      <div class="form-group">
        <label>Titolo *</label>
        <input type="text" id="inputTitle" placeholder="Nome del task..." maxlength="80">
      </div>
      <div class="form-group">
        <label>Descrizione</label>
        <textarea id="inputDesc" rows="3" placeholder="Note aggiuntive..."></textarea>
      </div>
      <div class="form-group">
        <label>Colonna</label>
        <select id="inputCol">
          <option value="todo">Da Fare</option>
          <option value="inprogress">In Corso</option>
          <option value="test">Test</option>
          <option value="done">Fatto</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priorità</label>
        <select id="inputPriority">
          <option value="">— Nessuna —</option>
          <option value="bassa">Bassa</option>
          <option value="media">Media</option>
          <option value="alta">Alta</option>
        </select>
      </div>
      <div class="form-group">
        <label>Creata da</label>
        <select id="inputCreatedBy">
          <option value="Davi">Davi</option>
          <option value="Loris">Loris</option>
          <option value="Merin">Merin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Assegnato a</label>
        <select id="inputAssignedTo">
          <option value="">— Nessuno —</option>
          <option value="Davi">Davi</option>
          <option value="Loris">Loris</option>
          <option value="Merin">Merin</option>
        </select>
      </div>

      <!-- TAGS -->
      <div class="form-group">
        <label>Tag (max 3)</label>
        <div class="modal-tags-list" id="modalTagsList"></div>
        <div class="tag-add-row" id="tagAddRow">
          <input type="text" id="inputTagText" placeholder="Testo tag..." maxlength="20"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addTag();}">
          <div id="tagColorSwatches" style="display:flex;gap:0.28rem;align-items:center;flex-shrink:0;"></div>
          <button type="button" class="btn-add-tag" onclick="addTag()">+</button>
        </div>
      </div>

      <div class="form-group">
        <label>Link / URL</label>
        <input type="text" id="inputLink" placeholder="https://...">
      </div>

      <!-- CHECKLIST -->
      <div class="form-group">
        <label>Checklist</label>
        <div class="modal-checklist-items" id="modalChecklistItems"></div>
        <div class="checklist-add-row">
          <input type="text" id="inputCheckItem" placeholder="Aggiungi elemento..."
            onkeydown="if(event.key==='Enter'){event.preventDefault();addChecklistItem();}">
          <button type="button" class="btn-add-check" onclick="addChecklistItem()">+ Aggiungi</button>
        </div>
      </div>

      <!-- COMMENTS (edit only) -->
      <div id="commentsSection" style="display:none;">
        <div class="modal-section-divider"></div>
        <div class="modal-section-label">Commenti</div>
        <div class="comment-list" id="commentList"></div>
        <div class="comment-add-row">
          <textarea id="inputComment" rows="2" placeholder="Scrivi un commento..."></textarea>
          <button type="button" class="btn-add-comment" onclick="addComment()">Invia</button>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeModal()">Annulla</button>
        <button class="btn-modal-primary" onclick="saveTask()">Salva</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DELETE -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-text">Eliminare questa task?<br>L'operazione non può essere annullata.</div>
      <div class="confirm-actions">
        <button class="btn-confirm-no" onclick="closeConfirm()">Annulla</button>
        <button class="btn-confirm-yes" onclick="confirmDeleteExec()">Elimina</button>
      </div>
    </div>
  </div>

  <!-- LOG DRAWER -->
  <div class="log-drawer" id="logDrawer">
    <div class="log-drawer-header">
      <span class="log-drawer-title">Log Attività</span>
      <button class="log-close" onclick="toggleLog()">✕</button>
    </div>
    <div class="log-list" id="logList"></div>
  </div>

  <!-- ARCHIVE MODAL -->
  <div class="archive-overlay" id="archiveOverlay" onclick="closeArchiveOutside(event)">
    <div class="archive-modal">
      <div class="archive-header">
        <div>
          <div class="archive-title">Archivio</div>
          <div class="archive-subtitle">Task in "Fatto" da oltre 7 giorni</div>
        </div>
        <button class="archive-close" onclick="closeArchive()">✕</button>
      </div>
      <div class="archive-list" id="archiveList"></div>
    </div>
  </div>

  <script>
    const COLS        = ['todo', 'inprogress', 'test', 'done'];
    const ARCHIVE_DAYS = 7;

    let tasks = [], activityLog = [];
    let editingId = null, draggedId = null;
    let dragOverCardId = null, dragOverPos = 'after';
    let filterSearch = '', filterPriority = '', filterAuthor = '';
    let pendingDeleteId = null;
    let modalChecklist = [], modalTags = [], newTagColor = 'none';

    // ── TAG COLORS ─────────────────────────────────────────
    const TAG_COLORS = [
      { id: 'none',   color: '#888',    bg: 'transparent' },
      { id: 'blue',   color: '#7aabde', bg: 'rgba(74,127,181,0.15)' },
      { id: 'gold',   color: '#c9a84c', bg: 'rgba(201,168,76,0.15)' },
      { id: 'purple', color: '#b08ad4', bg: 'rgba(123,94,167,0.15)' },
      { id: 'green',  color: '#6ab882', bg: 'rgba(58,122,80,0.15)' },
      { id: 'red',    color: '#d47a7a', bg: 'rgba(180,60,60,0.15)' },
      { id: 'teal',   color: '#6ac8c8', bg: 'rgba(50,160,160,0.15)' },
      { id: 'orange', color: '#d4a46a', bg: 'rgba(180,130,60,0.15)' },
    ];
    function getTagColor(id) { return TAG_COLORS.find(c => c.id === id) || TAG_COLORS[0]; }

    // ── THEME ──────────────────────────────────────────────
    function initTheme() {
      document.body.dataset.theme = localStorage.getItem('sb_theme') || 'dark';
      updateThemeBtn();
    }
    function toggleTheme() {
      document.body.dataset.theme = document.body.dataset.theme === 'light' ? 'dark' : 'light';
      localStorage.setItem('sb_theme', document.body.dataset.theme);
      updateThemeBtn();
    }
    function updateThemeBtn() {
      const btn = document.getElementById('themeBtn');
      if (btn) btn.textContent = document.body.dataset.theme === 'light' ? '🌙 Scuro' : '☀ Chiaro';
    }

    // ── ACTIVITY LOG ───────────────────────────────────────
    function addLog(text) {
      const now  = new Date();
      const time = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }) + ' ' +
                   now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      activityLog.unshift({ text, time });
      if (activityLog.length > 50) activityLog.length = 50;
      renderLog();
    }
    function renderLog() {
      const list = document.getElementById('logList');
      if (!list) return;
      list.innerHTML = activityLog.length
        ? activityLog.map(e => `<div class="log-entry"><span class="log-time">${esc(e.time)}</span><span class="log-text">${esc(e.text)}</span></div>`).join('')
        : '<div class="log-empty">Nessuna attività registrata.</div>';
    }
    function toggleLog() { document.getElementById('logDrawer').classList.toggle('open'); }

    // ── ARCHIVE ────────────────────────────────────────────
    function checkArchive() {
      let changed = false;
      const now = Date.now();
      tasks.forEach(t => {
        if (t.col === 'done' && !t.archived && t.movedToDoneAt) {
          if ((now - t.movedToDoneAt) / 86400000 >= ARCHIVE_DAYS) {
            t.archived = true;
            changed = true;
            addLog(`"${t.title}" archiviata automaticamente`);
          }
        }
      });
      return changed;
    }
    function openArchive() {
      const archived = tasks.filter(t => t.archived);
      const list = document.getElementById('archiveList');
      list.innerHTML = archived.length
        ? archived.map(t => `
            <div class="archive-card">
              <div class="archive-card-info">
                <div class="archive-card-title">${esc(t.title)}</div>
                <div class="archive-card-meta">${[t.createdBy ? 'da ' + esc(t.createdBy) : '', t.createdAt ? esc(t.createdAt) : '', t.desc ? esc(t.desc.slice(0,60)) + (t.desc.length > 60 ? '…' : '') : ''].filter(Boolean).join(' · ')}</div>
              </div>
              <button class="btn-restore" onclick="restoreTask('${t.id}')">Ripristina</button>
            </div>`).join('')
        : '<div class="archive-empty">Nessuna task archiviata.</div>';
      document.getElementById('archiveOverlay').classList.add('open');
    }
    function closeArchive() { document.getElementById('archiveOverlay').classList.remove('open'); }
    function closeArchiveOutside(e) { if (e.target === document.getElementById('archiveOverlay')) closeArchive(); }
    function restoreTask(id) {
      const t = tasks.find(x => x.id === id);
      if (t) { t.archived = false; t.col = 'todo'; t.movedToDoneAt = null; addLog(`"${t.title}" ripristinata dall'archivio`); save(); render(); openArchive(); }
    }

    // ── FILTERS ────────────────────────────────────────────
    function setFilterPriority(val) {
      filterPriority = val;
      document.querySelectorAll('[id^="fp-"]').forEach(b => b.classList.remove('active'));
      document.getElementById(val ? 'fp-' + val : 'fp-all').classList.add('active');
      render();
    }
    function setFilterAuthor(val) {
      filterAuthor = val;
      document.querySelectorAll('[id^="fa-"]').forEach(b => b.classList.remove('active'));
      document.getElementById(val ? 'fa-' + val.toLowerCase() : 'fa-all').classList.add('active');
      render();
    }
    function applyFilters(list) {
      return list.filter(t => {
        if (filterSearch) {
          const q = filterSearch.toLowerCase();
          if (!t.title.toLowerCase().includes(q) && !(t.desc || '').toLowerCase().includes(q)) return false;
        }
        if (filterPriority && t.priority !== filterPriority) return false;
        if (filterAuthor  && t.createdBy !== filterAuthor)   return false;
        return true;
      });
    }

    // ── TAGS IN MODAL ──────────────────────────────────────
    function buildTagSwatches() {
      const c = document.getElementById('tagColorSwatches');
      if (!c) return;
      c.innerHTML = '';
      TAG_COLORS.forEach(tc => {
        const s = document.createElement('div');
        s.title = tc.id;
        s.style.cssText = `width:13px;height:13px;border-radius:50%;cursor:pointer;background:${tc.id==='none'?'#333':tc.color};border:2px solid ${newTagColor===tc.id?'#fff':'transparent'};transition:border-color 0.12s;flex-shrink:0;`;
        if (tc.id === 'none') s.innerHTML = `<svg viewBox="0 0 12 12" width="9" height="9" style="display:block;margin:1px auto"><line x1="2" y1="2" x2="10" y2="10" stroke="#666" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="#666" stroke-width="1.5"/></svg>`;
        s.onclick = () => { newTagColor = tc.id; buildTagSwatches(); };
        c.appendChild(s);
      });
    }
    function renderModalTags() {
      const list   = document.getElementById('modalTagsList');
      const addRow = document.getElementById('tagAddRow');
      if (!list) return;
      list.innerHTML = modalTags.map((tag, i) => {
        const c = getTagColor(tag.color);
        return `<div class="modal-tag-pill" style="border-color:${c.color};color:${c.color};">${esc(tag.text)}<button onclick="removeTag(${i})">✕</button></div>`;
      }).join('');
      if (addRow) addRow.style.display = modalTags.length >= 3 ? 'none' : 'flex';
    }
    function addTag() {
      const input = document.getElementById('inputTagText');
      const text  = input.value.trim();
      if (!text || modalTags.length >= 3) return;
      modalTags.push({ text, color: newTagColor });
      input.value = ''; newTagColor = 'none';
      buildTagSwatches(); renderModalTags();
    }
    function removeTag(i) { modalTags.splice(i, 1); renderModalTags(); }

    // ── CHECKLIST IN MODAL ─────────────────────────────────
    function renderModalChecklist() {
      const c = document.getElementById('modalChecklistItems');
      if (!c) return;
      c.innerHTML = '';
      modalChecklist.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'modal-check-row';
        row.innerHTML = `<span>${esc(item.text)}</span><button class="modal-check-del" onclick="removeChecklistItem(${i})">✕</button>`;
        c.appendChild(row);
      });
    }
    function addChecklistItem() {
      const input = document.getElementById('inputCheckItem');
      const text  = input.value.trim();
      if (!text) return;
      modalChecklist.push({ text, done: false });
      input.value = ''; renderModalChecklist();
    }
    function removeChecklistItem(i) { modalChecklist.splice(i, 1); renderModalChecklist(); }
    function toggleCheck(taskId, idx) {
      const t = tasks.find(x => x.id === taskId);
      if (t && t.checklist && t.checklist[idx] !== undefined) {
        t.checklist[idx].done = !t.checklist[idx].done;
        save(); render();
      }
    }

    // ── COMMENTS ───────────────────────────────────────────
    function renderComments(comments) {
      const list = document.getElementById('commentList');
      if (!list) return;
      if (!comments || !comments.length) {
        list.innerHTML = '<div class="comment-empty">Nessun commento ancora.</div>'; return;
      }
      list.innerHTML = comments.map(c => `
        <div class="comment-item">
          <div class="comment-header">
            <span class="comment-author">${esc(c.author)}</span>
            <span class="comment-time">${esc(c.time)}</span>
          </div>
          <div class="comment-text">${esc(c.text)}</div>
        </div>`).join('');
    }
    function addComment() {
      if (!editingId) return;
      const text = document.getElementById('inputComment').value.trim();
      if (!text) return;
      const t = tasks.find(x => x.id === editingId);
      if (!t) return;
      if (!t.comments) t.comments = [];
      const now  = new Date();
      const time = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }) + ' ' +
                   now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      const author = document.getElementById('inputCreatedBy').value || 'Anonimo';
      t.comments.push({ author, text, time });
      document.getElementById('inputComment').value = '';
      addLog(`${author} ha commentato su "${t.title}"`);
      save(); renderComments(t.comments);
    }

    // ── CONFIRM DELETE ─────────────────────────────────────
    function confirmDelete(id) { pendingDeleteId = id; document.getElementById('confirmOverlay').classList.add('open'); }
    function closeConfirm()    { pendingDeleteId = null; document.getElementById('confirmOverlay').classList.remove('open'); }
    function confirmDeleteExec() {
      if (pendingDeleteId) {
        const t = tasks.find(x => x.id === pendingDeleteId);
        if (t) addLog(`"${t.title}" eliminata`);
        tasks = tasks.filter(x => x.id !== pendingDeleteId);
        save(); render();
      }
      closeConfirm();
    }

    // ── JSONBIN ────────────────────────────────────────────
    const JSONBIN_BIN_ID  = '69a483a3ae596e708f559b82';
    const JSONBIN_API_KEY = '$2a$10$p0kUTLR9by4mVs8qmR0BRuFhUOYeqqvvD10r3MqczrHT1cWdDy4.y';
    const JSONBIN_URL     = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
    let lastSavedHash = '';

    async function save() {
      try {
        setStatus('saving');
        const data = JSON.stringify({ tasks, activityLog });
        await fetch(JSONBIN_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Versioning': 'false' },
          body: data
        });
        lastSavedHash = data; setStatus('synced');
      } catch (e) { console.warn('save error', e); setStatus('error'); }
    }

    async function load() {
      try {
        const res    = await fetch(JSONBIN_URL + '/latest', { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
        const json   = await res.json();
        const record = json.record || {};
        tasks       = (record.tasks || []).map(migrateTask);
        activityLog = record.activityLog || [];
        lastSavedHash = JSON.stringify({ tasks, activityLog });
        renderLog();
      } catch (e) { tasks = []; activityLog = []; }
    }

    async function pollRemote() {
      try {
        const res    = await fetch(JSONBIN_URL + '/latest', { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
        const json   = await res.json();
        const record = json.record || {};
        const remote = JSON.stringify({ tasks: record.tasks || [], activityLog: record.activityLog || [] });
        if (remote !== lastSavedHash) {
          tasks = (record.tasks || []).map(migrateTask);
          activityLog = record.activityLog || [];
          lastSavedHash = remote;
          renderLog(); render();
        }
      } catch (e) {}
    }

    // Migra da formato vecchio (tag singolo) a nuovo (tags array)
    function migrateTask(t) {
      if (!t.tags) {
        t.tags = t.tag ? [{ text: t.tag, color: t.tagColor || 'none' }] : [];
        delete t.tag; delete t.tagColor;
      }
      if (!t.comments)  t.comments  = [];
      if (!t.checklist) t.checklist = [];
      return t;
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── RENDER ─────────────────────────────────────────────
    function render() {
      if (checkArchive()) save();
      renderSprint();

      COLS.forEach(col => {
        const container = document.getElementById('cards-' + col);
        const allCol    = tasks.filter(t => t.col === col && !t.archived);
        const filtered  = applyFilters(allCol);
        document.getElementById('count-' + col).textContent = allCol.length;
        container.innerHTML = '';
        if (!filtered.length) { container.innerHTML = '<div class="empty-col">Nessuna task</div>'; return; }

        const priorityLabel = { alta: 'Alta', media: 'Media', bassa: 'Bassa' };

        filtered.forEach(t => {
          const card = document.createElement('div');
          card.className = 'card';
          card.draggable = true;
          card.dataset.id = t.id;
          card.ondragstart = e => onDragStart(e, t.id);
          card.ondragend   = onDragEnd;
          card.ondragover  = e => onCardDragOver(e, t.id);
          card.ondrop      = e => onCardDrop(e, t.id);
          card.ondblclick  = () => openModal(t.col, t.id);

          const tagsHtml = (t.tags && t.tags.length)
            ? `<div class="card-tags">${t.tags.map(tag => {
                const c = getTagColor(tag.color);
                return `<span class="card-tag" style="color:${c.color};background:${c.bg};border-color:${c.id==='none'?'var(--border-m)':c.color}">${esc(tag.text)}</span>`;
              }).join('')}</div>` : '';

          const checklistHtml = (t.checklist && t.checklist.length)
            ? `<div class="card-checklist">${t.checklist.map((item, i) =>
                `<div class="check-item${item.done?' done':''}" onclick="event.stopPropagation();toggleCheck('${t.id}',${i})">
                  <div class="check-box">${item.done?'✓':''}</div>
                  <span class="check-text">${esc(item.text)}</span>
                </div>`).join('')}</div>` : '';

          const linkHtml = t.link
            ? `<a href="${esc(t.link)}" target="_blank" class="card-link" onclick="event.stopPropagation()">🔗 ${esc(t.link.replace(/^https?:\/\//,''))}</a>` : '';

          const commentsHint = (t.comments && t.comments.length)
            ? `<div class="card-comments-hint">💬 ${t.comments.length} comment${t.comments.length > 1 ? 'i' : 'o'}</div>` : '';

          card.innerHTML = `
            <div class="card-header-row">
              <div class="card-title">${esc(t.title)}</div>
              ${t.priority ? `<span class="priority-badge priority-${t.priority}">${priorityLabel[t.priority]}</span>` : ''}
            </div>
            ${t.desc ? `<div class="card-desc">${esc(t.desc)}</div>` : ''}
            ${tagsHtml}${checklistHtml}${linkHtml}${commentsHint}
            <div class="card-footer">
              <div class="card-footer-left">
                ${t.createdBy  ? `<span class="card-meta-text">da ${esc(t.createdBy)}</span>` : ''}
                ${t.assignedTo ? `<span class="card-meta-text" style="color:var(--tm);">→ ${esc(t.assignedTo)}</span>` : ''}
              </div>
              <div class="card-footer-right">
                ${t.createdAt ? `<span class="card-date">Creata il: ${esc(t.createdAt)}</span>` : ''}
                <div class="card-actions">
                  <button class="card-btn" onclick="openModal('${col}','${t.id}')">✎</button>
                  <button class="card-btn delete" onclick="confirmDelete('${t.id}')">✕</button>
                </div>
              </div>
            </div>`;
          container.appendChild(card);
        });
      });
    }

    // ── SPRINT PANEL ───────────────────────────────────────
    function getWeekNumber(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    }
    function getWeekRange() {
      const now = new Date();
      const day = now.getDay() || 7; // ISO: 1=Mon, 7=Sun
      const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      const fmt = d => d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' });
      return { mon, sun, label: `Sett. ${getWeekNumber(now)} · ${fmt(mon)} – ${fmt(sun)}`, year: now.getFullYear() };
    }
    function renderSprint() {
      const wr = getWeekRange();
      const lbl = document.getElementById('sprint-week-label');
      if (lbl) lbl.textContent = wr.label;
      const body = document.getElementById('sprint-body');
      if (!body) return;
      const activeCols = ['todo', 'inprogress', 'test', 'done'];
      const colColors  = { todo: '#4a7fb5', inprogress: '#c9a84c', test: '#9b7ec8', done: '#3a7a50' };
      const colLabels  = { todo: 'Da Fare', inprogress: 'In Corso', test: 'Test', done: 'Fatto' };
      body.innerHTML = activeCols.map(col => {
        const colTasks = tasks.filter(t => t.col === col && !t.archived);
        const items = colTasks.length
          ? colTasks.map(t => `<div class="sprint-task-item">${esc(t.title)}</div>`).join('')
          : `<div class="sprint-empty">—</div>`;
        return `<div class="sprint-col" data-col="${col}">
          <div class="sprint-col-name">${colLabels[col]}</div>
          <div class="sprint-task-list">${items}</div>
        </div>`;
      }).join('');
    }
    function toggleSprint() {
      document.getElementById('sprint-panel').classList.toggle('collapsed');
      renderSprint();
    }

    // ── DEVLOG DOWNLOAD ─────────────────────────────────────
    function downloadDevlog() {
      const wr = getWeekRange();
      const doneTasks = tasks.filter(t => t.col === 'done' && !t.archived);
      const priLabel = { alta: 'Alta', media: 'Media', bassa: 'Bassa', '': '—' };
      let md = `# Steelborne Devlog — Settimana ${getWeekNumber(wr.mon)} (${wr.mon.toLocaleDateString('it-IT')} – ${wr.sun.toLocaleDateString('it-IT')})\n\n`;
      md += `> Generato il ${new Date().toLocaleDateString('it-IT', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })}\n\n`;
      md += `---\n\n`;
      if (!doneTasks.length) {
        md += `*Nessuna task completata al momento.*\n`;
      } else {
        doneTasks.forEach((t, i) => {
          md += `## ${i + 1}. ${t.title}\n\n`;
          md += `**Priorità:** ${priLabel[t.priority] || '—'}`;
          if (t.createdBy)  md += ` | **Creata da:** ${t.createdBy}`;
          if (t.assignedTo) md += ` | **Assegnata a:** ${t.assignedTo}`;
          if (t.createdAt)  md += ` | **Data:** ${t.createdAt}`;
          md += `\n\n`;
          if (t.desc) {
            md += `### Descrizione\n${t.desc}\n\n`;
          }
          if (t.tags && t.tags.length) {
            md += `### Tag\n${t.tags.map(tg => `\`${tg.text}\``).join(' ')}\n\n`;
          }
          if (t.checklist && t.checklist.length) {
            md += `### Checklist\n`;
            t.checklist.forEach(item => {
              md += `- [${item.done ? 'x' : ' '}] ${item.text}\n`;
            });
            md += `\n`;
          }
          if (t.link) {
            md += `### Link\n${t.link}\n\n`;
          }
          if (t.comments && t.comments.length) {
            md += `### Commenti\n`;
            t.comments.forEach(c => {
              md += `**${c.author}** _(${c.time})_: ${c.text}\n\n`;
            });
          }
          md += `---\n\n`;
        });
      }
      const wn   = String(getWeekNumber(wr.mon)).padStart(2, '0');
      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `Steelborne_Devlog_W${wn}_${wr.year}.md`;
      a.click();
      URL.revokeObjectURL(url);

      if (doneTasks.length) {
        doneTasks.forEach(t => { t.archived = true; });
        addLog(`Devlog scaricato — ${doneTasks.length} task archiviate dalla colonna Fatto`);
        save();
        render();
      }
    }

    // ── MODAL ──────────────────────────────────────────────
    function openModal(col, id) {
      editingId = id || null;
      document.getElementById('modalTitle').textContent = id ? 'Modifica Task' : 'Nuova Task';
      const commSect = document.getElementById('commentsSection');

      if (id) {
        const t = tasks.find(x => x.id === id);
        document.getElementById('inputTitle').value      = t.title;
        document.getElementById('inputDesc').value       = t.desc || '';
        document.getElementById('inputCol').value        = t.col;
        document.getElementById('inputPriority').value   = t.priority || '';
        document.getElementById('inputCreatedBy').value  = t.createdBy || 'Davi';
        document.getElementById('inputAssignedTo').value = t.assignedTo || '';
        document.getElementById('inputLink').value       = t.link || '';
        modalChecklist = (t.checklist || []).map(c => ({...c}));
        modalTags      = (t.tags || []).map(tg => ({...tg}));
        commSect.style.display = 'block';
        renderComments(t.comments || []);
        document.getElementById('inputComment').value = '';
      } else {
        document.getElementById('inputTitle').value      = '';
        document.getElementById('inputDesc').value       = '';
        document.getElementById('inputCol').value        = col || 'todo';
        document.getElementById('inputPriority').value   = '';
        document.getElementById('inputCreatedBy').value  = 'Davi';
        document.getElementById('inputAssignedTo').value = '';
        document.getElementById('inputLink').value       = '';
        modalChecklist = []; modalTags = [];
        commSect.style.display = 'none';
      }
      newTagColor = 'none';
      renderModalChecklist(); renderModalTags(); buildTagSwatches();
      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('inputTitle').focus(), 150);
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
    function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

    // ── SAVE TASK ───────────────────────────────────────────
    function saveTask() {
      const title = document.getElementById('inputTitle').value.trim();
      if (!title) {
        document.getElementById('inputTitle').style.borderColor = '#800';
        document.getElementById('inputTitle').focus();
        setTimeout(() => document.getElementById('inputTitle').style.borderColor = '', 900);
        return;
      }
      const col        = document.getElementById('inputCol').value;
      const desc       = document.getElementById('inputDesc').value.trim();
      const priority   = document.getElementById('inputPriority').value;
      const createdBy  = document.getElementById('inputCreatedBy').value;
      const assignedTo = document.getElementById('inputAssignedTo').value;
      const link       = document.getElementById('inputLink').value.trim();
      const checklist  = modalChecklist.map(c => ({...c}));
      const tags       = modalTags.map(tg => ({...tg}));

      if (editingId) {
        const prev    = tasks.find(x => x.id === editingId);
        const prevCol = prev.col;
        Object.assign(prev, { title, col, desc, priority, createdBy, assignedTo, link, checklist, tags });
        if (col !== prevCol) {
          addLog(`${createdBy} ha spostato "${title}" in ${colName(col)}`);
          prev.movedToDoneAt = col === 'done' ? Date.now() : null;
        }
      } else {
        const now = new Date();
        const createdAt = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        tasks.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), title, col, desc, priority, createdBy, assignedTo, link, checklist, tags, createdAt, comments: [], movedToDoneAt: col === 'done' ? Date.now() : null });
        addLog(`${createdBy} ha creato "${title}"`);
      }
      save(); render(); closeModal();
    }

    function colName(col) { return { todo: 'Da Fare', inprogress: 'In Corso', test: 'Test', done: 'Fatto' }[col] || col; }

    // ── DRAG & DROP ─────────────────────────────────────────
    function onDragStart(e, id) {
      draggedId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => document.querySelector(`[data-id="${id}"]`)?.classList.add('dragging'), 0);
    }
    function onDragEnd() {
      document.querySelectorAll('.card.dragging').forEach(c => c.classList.remove('dragging'));
      document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
      clearDropIndicators();
      dragOverCardId = null;
      draggedId = null;
    }
    function clearDropIndicators() {
      document.querySelectorAll('.card.drop-before, .card.drop-after').forEach(c => {
        c.classList.remove('drop-before', 'drop-after');
      });
    }
    function onCardDragOver(e, id) {
      e.preventDefault();
      e.stopPropagation();
      const rect = e.currentTarget.getBoundingClientRect();
      const pos  = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
      if (dragOverCardId !== id || dragOverPos !== pos) {
        clearDropIndicators();
        dragOverCardId = id;
        dragOverPos    = pos;
        if (id !== draggedId) e.currentTarget.classList.add('drop-' + pos);
      }
      e.currentTarget.closest('.column')?.classList.add('drag-over');
    }
    function onCardDrop(e, id) {
      e.preventDefault();
      e.stopPropagation();
      const pos = dragOverPos;
      clearDropIndicators();
      if (!draggedId || draggedId === id) { dragOverCardId = null; return; }
      const dragged = tasks.find(x => x.id === draggedId);
      const target  = tasks.find(x => x.id === id);
      if (!dragged || !target) return;
      const prevCol = dragged.col;
      tasks = tasks.filter(x => x.id !== draggedId);
      const targetIdx = tasks.findIndex(x => x.id === id);
      dragged.col = target.col;
      if (dragged.col !== prevCol) {
        dragged.movedToDoneAt = dragged.col === 'done' ? Date.now() : null;
        addLog(`"${dragged.title}" spostata in ${colName(dragged.col)}`);
      }
      tasks.splice(pos === 'before' ? targetIdx : targetIdx + 1, 0, dragged);
      dragOverCardId = null;
      save(); render();
    }
    function onDragOver(e)  { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function onDragLeave(e) {
      if (!e.currentTarget.contains(e.relatedTarget)) {
        e.currentTarget.classList.remove('drag-over');
        clearDropIndicators();
        dragOverCardId = null;
      }
    }
    function onDrop(e) {
      e.preventDefault();
      const col = e.currentTarget.dataset.col;
      if (draggedId && col) {
        const t = tasks.find(x => x.id === draggedId);
        if (t && t.col !== col) {
          const prevCol = t.col; t.col = col;
          t.movedToDoneAt = col === 'done' ? Date.now() : null;
          addLog(`"${t.title}" spostata in ${colName(col)}`);
          save(); render();
        }
      }
      e.currentTarget.classList.remove('drag-over');
    }

    // ── KEYBOARD ────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeConfirm(); }
      const modalOpen = document.getElementById('modalOverlay').classList.contains('open');
      const notSpecialInput = !['TEXTAREA'].includes(document.activeElement.tagName) &&
                              !['inputCheckItem','inputTagText','inputComment'].includes(document.activeElement.id);
      if (e.key === 'Enter' && modalOpen && notSpecialInput) saveTask();
      if (e.key === 'n' && !modalOpen && document.activeElement.tagName === 'BODY') openModal();
    });

    // ── STATUS ──────────────────────────────────────────────
    function setStatus(state) {
      const el = document.getElementById('syncStatus');
      if (!el) return;
      if (state === 'loading') { el.textContent = '○ Caricamento...';   el.style.color = 'var(--tm)'; }
      else if (state === 'synced') { el.textContent = '● Live';          el.style.color = '#6ab882'; }
      else if (state === 'saving') { el.textContent = '◌ Salvataggio...'; el.style.color = '#c9a84c'; }
      else if (state === 'error')  { el.textContent = '✕ Errore sync';   el.style.color = '#d47a7a'; }
    }

    // ── INIT ────────────────────────────────────────────────
    initTheme();
    // Imposta subito il label della settimana corrente
    const _wr = getWeekRange();
    const _lbl = document.getElementById('sprint-week-label');
    if (_lbl) _lbl.textContent = _wr.label;
    (async () => {
      setStatus('loading');
      await load();
      render();
      setStatus('synced');
      setInterval(pollRemote, 3000);
    })();
  </script>
</body>
