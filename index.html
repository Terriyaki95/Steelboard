<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steelboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;700;900&family=Cormorant+SC:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'IM Fell English', serif;
      min-height: 100vh;
      overflow-x: auto;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.6rem 2.5rem 1.4rem;
      border-bottom: 1px solid #333;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo-svg {
      height: 62px;
      width: auto;
    }

    .header-actions {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 1.1rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #444;
      color: #888;
    }

    .btn-outline:hover {
      border-color: #fff;
      color: #fff;
    }

    .btn-solid {
      background: #fff;
      border: 1px solid #fff;
      color: #000;
    }

    .btn-solid:hover {
      background: #ddd;
      border-color: #ddd;
    }

    /* ── BOARD ──────────────────────────────────────────── */
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1a1a1a;
      border-top: 1px solid #1a1a1a;
      min-height: calc(100vh - 97px);
    }

    /* ── COLUMN ─────────────────────────────────────────── */
    .column {
      background: #000;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 98px);
      transition: background 0.15s;
    }

    .column[data-col="todo"] {
      border-top: 2px solid #4a7fb5;
    }

    .column[data-col="inprogress"] {
      border-top: 2px solid #c9a84c;
    }

    .column[data-col="test"] {
      border-top: 2px solid #7b5ea7;
    }

    .column[data-col="done"] {
      border-top: 2px solid #3a7a50;
    }

    .column.drag-over {
      background: #0c0c0c;
    }

    .column-header {
      padding: 1.1rem 1.2rem 0.9rem;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .column-title-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .col-line {
      width: 18px;
      height: 1px;
    }

    .column[data-col="todo"] .col-line {
      background: #4a7fb5;
    }

    .column[data-col="inprogress"] .col-line {
      background: #c9a84c;
    }

    .column[data-col="test"] .col-line {
      background: #7b5ea7;
    }

    .column[data-col="done"] .col-line {
      background: #3a7a50;
    }

    .column-name {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .column[data-col="todo"] .column-name {
      color: #7aabde;
    }

    .column[data-col="inprogress"] .column-name {
      color: #c9a84c;
    }

    .column[data-col="test"] .column-name {
      color: #b08ad4;
    }

    .column[data-col="done"] .column-name {
      color: #6ab882;
    }

    .col-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .column-count {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      color: #555;
      letter-spacing: 0.05em;
    }

    .col-add-btn {
      background: none;
      border: 1px solid #333;
      color: #555;
      cursor: pointer;
      font-size: 0.9rem;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      transition: color 0.1s, border-color 0.1s;
      line-height: 1;
    }

    .col-add-btn:hover {
      color: #fff;
      border-color: #fff;
    }

    /* ── CARDS ───────────────────────────────────────────── */
    .cards-container {
      padding: 0.8rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .card {
      border: 1px solid #222;
      background: #070707;
      padding: 0.85rem 0.95rem;
      cursor: grab;
      transition: border-color 0.15s, transform 0.15s;
      animation: cardIn 0.2s ease;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      border-color: #555;
      transform: translateY(-1px);
    }

    .card.dragging {
      opacity: 0.3;
      cursor: grabbing;
    }

    .card-title {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.78rem;
      line-height: 1.5;
      letter-spacing: 0.04em;
      color: #fff;
      margin-bottom: 0.4rem;
      word-break: break-word;
    }

    .card-desc {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.88rem;
      color: #777;
      line-height: 1.5;
      word-break: break-word;
    }

    .card-footer {
      margin-top: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-tag {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      border: 1px solid #333;
      padding: 0.1rem 0.45rem;
    }

    .card-actions {
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.12s;
    }

    .card:hover .card-actions {
      opacity: 1;
    }

    .card-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.72rem;
      padding: 0.18rem 0.35rem;
      transition: color 0.1s;
    }

    .card-btn:hover {
      color: #fff;
    }

    .card-btn.delete:hover {
      color: #c04040;
    }

    .empty-col {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: #2a2a2a;
      font-size: 0.85rem;
      text-align: center;
      padding: 2.5rem 1rem;
    }

    /* ── MODAL ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #080808;
      border: 1px solid #333;
      width: 100%;
      max-width: 420px;
      padding: 2.2rem 2rem;
      transform: translateY(10px);
      transition: transform 0.2s;
      position: relative;
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal::before,
    .modal::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: #444;
      border-style: solid;
    }

    .modal::before {
      top: 8px;
      left: 8px;
      border-width: 1px 0 0 1px;
    }

    .modal::after {
      bottom: 8px;
      right: 8px;
      border-width: 0 1px 1px 0;
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .modal-rule {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }

    .modal-rule::before,
    .modal-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }

    .modal-rule span {
      color: #444;
      font-size: 0.5rem;
      letter-spacing: 0.4em;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: #000;
      border: 1px solid #2e2e2e;
      color: #fff;
      font-family: 'IM Fell English', serif;
      font-size: 1rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
      border-radius: 0;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #666;
    }

    .form-group select option {
      background: #080808;
    }

    .modal-actions {
      display: flex;
      gap: 0.7rem;
      margin-top: 1.6rem;
    }

    .btn-modal-primary {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.75rem;
      cursor: pointer;
      background: #fff;
      border: 1px solid #fff;
      color: #000;
      transition: background 0.15s;
      border-radius: 0;
    }

    .btn-modal-primary:hover {
      background: #ddd;
    }

    .btn-modal-cancel {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.75rem 1.1rem;
      cursor: pointer;
      background: transparent;
      border: 1px solid #2e2e2e;
      color: #555;
      transition: color 0.15s, border-color 0.15s;
      border-radius: 0;
    }

    .btn-modal-cancel:hover {
      color: #fff;
      border-color: #555;
    }

    @media (max-width: 900px) {
      .board {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .board {
        grid-template-columns: 1fr;
      }

      header {
        padding: 1rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <span
      style="font-family:'Cormorant SC','Cormorant',Georgia,serif;font-size:2.6rem;font-weight:600;color:#fff;letter-spacing:0.05em;">Steelboard</span>

    <div class="header-actions">
      <span id="syncStatus" style="font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.1em;color:#555;">○
        Caricamento...</span>
      <button class="btn btn-solid" onclick="openModal()">+ Nuovo Task</button>
    </div>
  </header>

  <div class="board" id="board">
    <div class="column" data-col="todo" ondragover="onDragOver(event)" ondrop="onDrop(event)"
      ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap">
          <div class="col-line"></div><span class="column-name">Da Fare</span>
        </div>
        <div class="col-header-right">
          <span class="column-count" id="count-todo">0</span>
          <button class="col-add-btn" onclick="openModal('todo')">+</button>
        </div>
      </div>
      <div class="cards-container" id="cards-todo"></div>
    </div>

    <div class="column" data-col="inprogress" ondragover="onDragOver(event)" ondrop="onDrop(event)"
      ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap">
          <div class="col-line"></div><span class="column-name">In Corso</span>
        </div>
        <div class="col-header-right">
          <span class="column-count" id="count-inprogress">0</span>
          <button class="col-add-btn" onclick="openModal('inprogress')">+</button>
        </div>
      </div>
      <div class="cards-container" id="cards-inprogress"></div>
    </div>

    <div class="column" data-col="test" ondragover="onDragOver(event)" ondrop="onDrop(event)"
      ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap">
          <div class="col-line"></div><span class="column-name">Test</span>
        </div>
        <div class="col-header-right">
          <span class="column-count" id="count-test">0</span>
          <button class="col-add-btn" onclick="openModal('test')">+</button>
        </div>
      </div>
      <div class="cards-container" id="cards-test"></div>
    </div>

    <div class="column" data-col="done" ondragover="onDragOver(event)" ondrop="onDrop(event)"
      ondragleave="onDragLeave(event)">
      <div class="column-header">
        <div class="column-title-wrap">
          <div class="col-line"></div><span class="column-name">Fatto</span>
        </div>
        <div class="col-header-right">
          <span class="column-count" id="count-done">0</span>
          <button class="col-add-btn" onclick="openModal('done')">+</button>
        </div>
      </div>
      <div class="cards-container" id="cards-done"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Nuovo Task</div>
      <div class="modal-rule"><span>✦</span></div>
      <div class="form-group">
        <label>Titolo *</label>
        <input type="text" id="inputTitle" placeholder="Nome del task..." maxlength="80">
      </div>
      <div class="form-group">
        <label>Descrizione</label>
        <textarea id="inputDesc" rows="3" placeholder="Note aggiuntive..."></textarea>
      </div>
      <div class="form-group">
        <label>Colonna</label>
        <select id="inputCol">
          <option value="todo">Da Fare</option>
          <option value="inprogress">In Corso</option>
          <option value="test">Test</option>
          <option value="done">Fatto</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tag &amp; Colore</label>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <input type="text" id="inputTag" placeholder="Es. arte, regole, lore..." maxlength="20" style="flex:1">
          <div id="colorSwatches" style="display:flex;gap:0.35rem;align-items:center;flex-shrink:0;"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeModal()">Annulla</button>
        <button class="btn-modal-primary" onclick="saveTask()">Salva</button>
      </div>
    </div>
  </div>

  <script>
    const COLS = ['todo', 'inprogress', 'test', 'done'];
    let tasks = [], editingId = null, draggedId = null;

    const TAG_COLORS = [
      { id: 'none', color: '#555', bg: 'transparent' },
      { id: 'blue', color: '#7aabde', bg: 'rgba(74,127,181,0.15)' },
      { id: 'gold', color: '#c9a84c', bg: 'rgba(201,168,76,0.15)' },
      { id: 'purple', color: '#b08ad4', bg: 'rgba(123,94,167,0.15)' },
      { id: 'green', color: '#6ab882', bg: 'rgba(58,122,80,0.15)' },
      { id: 'red', color: '#d47a7a', bg: 'rgba(180,60,60,0.15)' },
      { id: 'teal', color: '#6ac8c8', bg: 'rgba(50,160,160,0.15)' },
      { id: 'orange', color: '#d4a46a', bg: 'rgba(180,130,60,0.15)' },
    ];

    let selectedTagColor = 'none';

    function getTagColorById(id) {
      return TAG_COLORS.find(c => c.id === id) || TAG_COLORS[0];
    }

    function buildSwatches() {
      const container = document.getElementById('colorSwatches');
      container.innerHTML = '';
      TAG_COLORS.forEach(c => {
        const s = document.createElement('div');
        s.dataset.colorId = c.id;
        s.title = c.id;
        s.style.cssText = `
      width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
      background: ${c.id === 'none' ? '#222' : c.color};
      border: 2px solid ${selectedTagColor === c.id ? '#fff' : 'transparent'};
      transition: border-color 0.12s, transform 0.12s;
      flex-shrink: 0;
    `;
        if (c.id === 'none') {
          s.innerHTML = `<svg viewBox="0 0 12 12" width="10" height="10" style="display:block;margin:1px auto"><line x1="2" y1="2" x2="10" y2="10" stroke="#555" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="#555" stroke-width="1.5"/></svg>`;
        }
        s.onclick = () => {
          selectedTagColor = c.id;
          buildSwatches();
        };
        container.appendChild(s);
      });
    }

    // ── JSONBin config ─────────────────────────────────────
    // ISTRUZIONI: sostituisci questi valori con i tuoi dopo
    // aver creato il bin su jsonbin.io (vedi README)
    const JSONBIN_BIN_ID = '69a483a3ae596e708f559b82';
    const JSONBIN_API_KEY = '$2a$10$p0kUTLR9by4mVs8qmR0BRuFhUOYeqqvvD10r3MqczrHT1cWdDy4.y';
    const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

    let lastSavedHash = '';

    async function save() {
      try {
        setStatus('saving');
        const data = JSON.stringify(tasks);
        await fetch(JSONBIN_URL, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': JSONBIN_API_KEY,
            'X-Bin-Versioning': 'false'
          },
          body: JSON.stringify({ tasks })
        });
        lastSavedHash = data;
        setStatus('synced');
      } catch (e) { console.warn('save error', e); setStatus('error'); }
    }

    async function load() {
      try {
        const res = await fetch(JSONBIN_URL + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        const json = await res.json();
        tasks = json.record?.tasks || [];
        lastSavedHash = JSON.stringify(tasks);
      } catch (e) { tasks = []; }
    }

    async function pollRemote() {
      try {
        const res = await fetch(JSONBIN_URL + '/latest', {
          headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        const json = await res.json();
        const remote = JSON.stringify(json.record?.tasks || []);
        if (remote !== lastSavedHash) {
          tasks = json.record?.tasks || [];
          lastSavedHash = remote;
          render();
        }
      } catch (e) { }
    }

    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function render() {
      COLS.forEach(col => {
        const container = document.getElementById('cards-' + col);
        const colTasks = tasks.filter(t => t.col === col);
        document.getElementById('count-' + col).textContent = colTasks.length;
        container.innerHTML = '';
        if (colTasks.length === 0) { container.innerHTML = '<div class="empty-col">Nessun task</div>'; return; }
        colTasks.forEach(t => {
          const card = document.createElement('div');
          card.className = 'card';
          card.draggable = true;
          card.dataset.id = t.id;
          card.ondragstart = e => onDragStart(e, t.id);
          card.ondragend = onDragEnd;
          card.ondblclick = () => openModal(t.col, t.id);
          card.innerHTML = `
        <div class="card-title">${esc(t.title)}</div>
        ${t.desc ? `<div class="card-desc">${esc(t.desc)}</div>` : ''}
        <div class="card-footer">
          ${t.tag ? (() => { const c = getTagColorById(t.tagColor || 'none'); return `<span class="card-tag" style="color:${c.color};background:${c.bg};border-color:${c.id === 'none' ? '#333' : c.color}">${esc(t.tag)}</span>`; })() : '<span></span>'}
          <div class="card-actions">
            <button class="card-btn" onclick="openModal('${col}','${t.id}')">✎</button>
            <button class="card-btn delete" onclick="deleteTask('${t.id}')">✕</button>
          </div>
        </div>`;
          container.appendChild(card);
        });
      });
    }

    function openModal(col, id) {
      editingId = id || null;
      document.getElementById('modalTitle').textContent = id ? 'Modifica Task' : 'Nuovo Task';
      if (id) {
        const t = tasks.find(x => x.id === id);
        document.getElementById('inputTitle').value = t.title;
        document.getElementById('inputDesc').value = t.desc || '';
        document.getElementById('inputCol').value = t.col;
        document.getElementById('inputTag').value = t.tag || '';
        selectedTagColor = t.tagColor || 'none';
      } else {
        document.getElementById('inputTitle').value = '';
        document.getElementById('inputDesc').value = '';
        document.getElementById('inputCol').value = col || 'todo';
        document.getElementById('inputTag').value = '';
        selectedTagColor = 'none';
      }
      buildSwatches();
      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('inputTitle').focus(), 150);
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
    function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

    function saveTask() {
      const title = document.getElementById('inputTitle').value.trim();
      if (!title) {
        document.getElementById('inputTitle').style.borderColor = '#800';
        document.getElementById('inputTitle').focus();
        setTimeout(() => document.getElementById('inputTitle').style.borderColor = '', 900);
        return;
      }
      const col = document.getElementById('inputCol').value;
      const desc = document.getElementById('inputDesc').value.trim();
      const tag = document.getElementById('inputTag').value.trim();
      const tagColor = selectedTagColor;
      if (editingId) {
        Object.assign(tasks.find(x => x.id === editingId), { title, col, desc, tag, tagColor });
      } else {
        tasks.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), title, col, desc, tag, tagColor });
      }
      save(); render(); closeModal();
    }

    function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); save(); render(); }

    function onDragStart(e, id) {
      draggedId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => document.querySelector(`[data-id="${id}"]`)?.classList.add('dragging'), 0);
    }
    function onDragEnd() {
      document.querySelectorAll('.card.dragging').forEach(c => c.classList.remove('dragging'));
      document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
      draggedId = null;
    }
    function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function onDragLeave(e) { if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over'); }
    function onDrop(e) {
      e.preventDefault();
      const col = e.currentTarget.dataset.col;
      if (draggedId && col) { const t = tasks.find(x => x.id === draggedId); if (t) { t.col = col; save(); render(); } }
      e.currentTarget.classList.remove('drag-over');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open') && document.activeElement.tagName !== 'TEXTAREA') saveTask();
      if (e.key === 'n' && !document.getElementById('modalOverlay').classList.contains('open') && document.activeElement.tagName === 'BODY') openModal();
    });

    // Init
    (async () => {
      setStatus('loading');
      await load();
      render();
      setStatus('synced');
      setInterval(pollRemote, 3000);
    })();

    function setStatus(state) {
      const el = document.getElementById('syncStatus');
      if (!el) return;
      if (state === 'loading') { el.textContent = '○ Caricamento...'; el.style.color = '#555'; }
      else if (state === 'synced') { el.textContent = '● Live'; el.style.color = '#6ab882'; }
      else if (state === 'saving') { el.textContent = '◌ Salvataggio...'; el.style.color = '#c9a84c'; }
      else if (state === 'error') { el.textContent = '✕ Errore sync'; el.style.color = '#d47a7a'; }
    }
  </script>
</body>

</html>
